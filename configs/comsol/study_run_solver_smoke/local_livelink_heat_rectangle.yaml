capability_id: multiphysics.comsol.study_run_solver_smoke
asset_id: C05_study_run_solver_smoke
case_id: local_livelink_heat_rectangle
description: COMSOL C05 local MATLAB/LiveLink generated heat-rectangle stationary study solver smoke.
depends_on:
- multiphysics.comsol.physics_boundary_assignment_contract
comsol:
  runtime_profile: local_matlab_comsol_preflight
  runtime_profile_config: configs/comsol/runtime_profiles/local_matlab_comsol_preflight.yaml
  command_env: COMSOL_BIN
  mphserver_env: COMSOL_MPHSERVER_BIN
  version_family: env_configured
matlab:
  executable_env: MATLAB_EXE
  batch_argument: -batch
livelink:
  mli_dir_env: COMSOL_MLI_DIR
  required_matlab_functions:
  - mphstart
  - mphinterp
server:
  host_env: COMSOL_SERVER_HOST
  port_env: COMSOL_SERVER_PORT
  connection_mode: local_or_server
backend:
  type: matlab_livelink_heat_rectangle_smoke
  timeout_s: 360
contract:
  stage: study_run_solver_smoke
  scope: COMSOL C05 smoke creates a generated heat rectangle, assigns physics, runs one stationary study, and records solver/dataset artifacts; no official replay, double-v, or benchmark validation is claimed.
  source_boundary: Consumes generated C04 assignment semantics within one self-contained smoke.
  declared_objects:
  - name: solver_manifest
    role: solver_manifest
    required: true
    description: Declares stationary study execution and completion status for this generated case.
  - name: dataset_manifest
    role: dataset_manifest
    required: true
    description: Declares nonempty solution dataset state after the smoke solve.
  artifacts:
  - path: solver_manifest.json
    role: solver status smoke
    required: true
  - path: dataset_manifest.json
    role: dataset state smoke
    required: true
  handoff_contract:
  - solver success must remain separate from analytical or benchmark validation
  - dataset state must be present before C06 result extraction
heat_rectangle:
  script_filename: matlab_c05_heat_rectangle_smoke.m
  tags:
    model_tag: c05_heat_rectangle
    component_tag: comp1
    geometry_tag: geom1
    rectangle_tag: rect1
    mesh_tag: mesh1
    material_tag: mat1
    physics_tag: ht
    temperature_boundary_tag: temp1
    study_tag: std1
    study_feature_tag: stat
  geometry:
    width: 1.0
    height: 0.5
    width_parameter: c05_width
    height_parameter: c05_height
  mesh:
    auto_mesh_size: 5
  physics:
    interface_type: HeatTransfer
    material_type: Common
    boundary_condition_type: TemperatureBoundary
    boundary_temperature: 300[K]
  study:
    study_type: Stationary
  probes:
  - name: center
    expression: T
    x: 0.5
    y: 0.25
    unit: K
    expected_value: 300.0
    tolerance: 1.0e-6
outputs:
  output_dir: _results/comsol/study_run_solver_smoke/local_livelink_heat_rectangle
  expected_outputs:
  - solver_manifest.json
  - dataset_manifest.json
  - matlab_c05_heat_rectangle_smoke.m
  - stdout.txt
  - stderr.txt
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
validation:
  gate: smoke
  required_environment:
  - MATLAB_EXE
  - COMSOL_BIN
  - COMSOL_MLI_DIR
  optional_environment:
  - COMSOL_MPHSERVER_BIN
  - COMSOL_SERVER_HOST
  - COMSOL_SERVER_PORT
  require_path_exists: true
  require_matlab_execution: true
  required_object_roles:
  - solver_manifest
  - dataset_manifest
  required_manifest_sections:
  - source_config
  - schema_id
  - backend
  - contract
  - heat_rectangle
  - generated_files
  - expected_outputs
  - metrics
  - validation
  required_artifacts:
  - solver_manifest.json
  - dataset_manifest.json
  - matlab_c05_heat_rectangle_smoke.m
  - stdout.txt
  - stderr.txt
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
  no_claims:
  - C05 proves generated rectangle stationary solver completion and dataset runtime smoke only
  - C05 does not claim analytical field validation, official replay, double-v, or benchmark validation
  - local executable, license, server, and Application Library paths must remain environment-injected
