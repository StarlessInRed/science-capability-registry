capability_id: multiphysics.comsol.matlab_server_bridge_runtime
case_id: local_preflight
description: COMSOL C01 local MATLAB/LiveLink runtime preflight; verifies the configured boundary before any COMSOL solver smoke is claimed.
comsol:
  runtime_profile: local_matlab_comsol_preflight
  runtime_profile_config: configs/comsol/runtime_profiles/local_matlab_comsol_preflight.yaml
  command_env: COMSOL_BIN
  mphserver_env: COMSOL_MPHSERVER_BIN
  version_family: env_configured
matlab:
  executable_env: MATLAB_EXE
  batch_argument: -batch
livelink:
  mli_dir_env: COMSOL_MLI_DIR
  required_matlab_functions:
  - mphstart
  - mphglobal
  - mphinterp
server:
  host_env: COMSOL_SERVER_HOST
  port_env: COMSOL_SERVER_PORT
  connection_mode: local_or_server
backend:
  type: preflight_only
  timeout_s: 60
smoke_script:
  filename: matlab_bridge_smoke.m
  model_tag: c01_minimal_bridge
  expected_scalar_name: bridge_scalar
outputs:
  output_dir: _results/comsol/matlab_server_bridge_runtime/local_preflight
  expected_outputs:
  - manifest.json
  - matlab_bridge_smoke.m
  - metrics.json
  - validation.json
  - validation_report.md
  - stdout.txt
  - stderr.txt
validation:
  gate: static-readiness
  required_environment:
  - MATLAB_EXE
  - COMSOL_BIN
  - COMSOL_MLI_DIR
  optional_environment:
  - COMSOL_MPHSERVER_BIN
  - COMSOL_SERVER_HOST
  - COMSOL_SERVER_PORT
  require_path_exists: true
  require_matlab_execution: false
  required_artifacts:
  - manifest.json
  - matlab_bridge_smoke.m
  - metrics.json
  - validation.json
  - validation_report.md
  no_claims:
  - preflight_only does not execute MATLAB or COMSOL
  - package skeleton does not prove LiveLink startup, COMSOL study execution, or physics benchmark validation
  - local executable, license, server, and Application Library paths must remain environment-injected
