capability_id: multiphysics.comsol.matlab_server_bridge_runtime
case_id: local_livelink_smoke
description: COMSOL C01 local MATLAB/LiveLink smoke; connects MATLAB to a running COMSOL server, creates a minimal model, and extracts one finite scalar through mphevaluate.
comsol:
  runtime_profile: local_matlab_comsol_preflight
  runtime_profile_config: configs/comsol/runtime_profiles/local_matlab_comsol_preflight.yaml
  command_env: COMSOL_BIN
  mphserver_env: COMSOL_MPHSERVER_BIN
  version_family: env_configured
matlab:
  executable_env: MATLAB_EXE
  batch_argument: -batch
livelink:
  mli_dir_env: COMSOL_MLI_DIR
  required_matlab_functions:
  - mphstart
  - mphevaluate
server:
  host_env: COMSOL_SERVER_HOST
  port_env: COMSOL_SERVER_PORT
  connection_mode: local_or_server
backend:
  type: matlab_livelink_smoke
  timeout_s: 180
smoke_script:
  filename: matlab_bridge_smoke.m
  model_tag: c01_minimal_bridge
  expected_scalar_name: bridge_scalar
outputs:
  output_dir: _results/comsol/matlab_server_bridge_runtime/local_livelink_smoke
  expected_outputs:
  - manifest.json
  - matlab_bridge_smoke.m
  - metrics.json
  - validation.json
  - validation_report.md
  - stdout.txt
  - stderr.txt
  - comsol_c01_scalar.txt
validation:
  gate: smoke
  required_environment:
  - MATLAB_EXE
  - COMSOL_BIN
  - COMSOL_MLI_DIR
  optional_environment:
  - COMSOL_MPHSERVER_BIN
  - COMSOL_SERVER_HOST
  - COMSOL_SERVER_PORT
  require_path_exists: true
  require_matlab_execution: true
  required_artifacts:
  - manifest.json
  - matlab_bridge_smoke.m
  - metrics.json
  - validation.json
  - validation_report.md
  - comsol_c01_scalar.txt
  no_claims:
  - local_livelink_smoke proves MATLAB-COMSOL bridge connectivity and finite parameter evaluation only
  - no COMSOL study solve, field result extraction, official model replay, or physics benchmark validation is claimed
  - local executable, license, server, and Application Library paths must remain environment-injected
