capability_id: multiphysics.comsol.physics_boundary_assignment_contract
asset_id: C04_physics_boundary_assignment_contract
case_id: local_livelink_heat_rectangle
description: COMSOL C04 local MATLAB/LiveLink generated heat-rectangle physics, material, boundary, and unit assignment smoke.
depends_on:
- multiphysics.comsol.geometry_mesh_import_contract
comsol:
  runtime_profile: local_matlab_comsol_preflight
  runtime_profile_config: configs/comsol/runtime_profiles/local_matlab_comsol_preflight.yaml
  command_env: COMSOL_BIN
  mphserver_env: COMSOL_MPHSERVER_BIN
  version_family: env_configured
matlab:
  executable_env: MATLAB_EXE
  batch_argument: -batch
livelink:
  mli_dir_env: COMSOL_MLI_DIR
  required_matlab_functions:
  - mphstart
server:
  host_env: COMSOL_SERVER_HOST
  port_env: COMSOL_SERVER_PORT
  connection_mode: local_or_server
backend:
  type: matlab_livelink_heat_rectangle_smoke
  timeout_s: 300
contract:
  stage: physics_boundary_assignment_contract
  scope: COMSOL C04 smoke creates a generated heat rectangle, assigns material, HeatTransfer physics, all-boundary temperature, and unit policy; no solver execution, official replay, double-v, or benchmark validation is claimed.
  source_boundary: Consumes generated C03 rectangle geometry and mesh semantics within one self-contained smoke.
  declared_objects:
  - name: physics_assignment_manifest
    role: physics_assignment_manifest
    required: true
    description: Declares physics interface and material assignment completeness for this generated case.
  - name: boundary_assignment_manifest
    role: boundary_assignment_manifest
    required: true
    description: Declares all-boundary fixed-temperature assignment for this generated rectangle.
  - name: unit_policy
    role: unit_policy
    required: true
    description: Declares canonical temperature expression and unit policy.
  artifacts:
  - path: physics_assignment_manifest.json
    role: physics and material assignment smoke
    required: true
  - path: boundary_assignment_manifest.json
    role: boundary assignment completeness smoke
    required: true
  - path: unit_policy.json
    role: units handoff smoke
    required: true
  handoff_contract:
  - physics and material tags must be explicit before C05 solver execution
  - boundary assignment completeness must stay separate from solver convergence
  - unit policy must be available before C06 result export
heat_rectangle:
  script_filename: matlab_c04_heat_rectangle_smoke.m
  tags:
    model_tag: c04_heat_rectangle
    component_tag: comp1
    geometry_tag: geom1
    rectangle_tag: rect1
    mesh_tag: mesh1
    material_tag: mat1
    physics_tag: ht
    temperature_boundary_tag: temp1
    study_tag: std1
    study_feature_tag: stat
  geometry:
    width: 1.0
    height: 0.5
    width_parameter: c04_width
    height_parameter: c04_height
  mesh:
    auto_mesh_size: 5
  physics:
    interface_type: HeatTransfer
    material_type: Common
    boundary_condition_type: TemperatureBoundary
    boundary_temperature: 300[K]
  study:
    study_type: Stationary
  probes:
  - name: center
    expression: T
    x: 0.5
    y: 0.25
    unit: K
    expected_value: 300.0
    tolerance: 1.0e-6
outputs:
  output_dir: _results/comsol/physics_boundary_assignment_contract/local_livelink_heat_rectangle
  expected_outputs:
  - physics_assignment_manifest.json
  - boundary_assignment_manifest.json
  - unit_policy.json
  - matlab_c04_heat_rectangle_smoke.m
  - stdout.txt
  - stderr.txt
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
validation:
  gate: smoke
  required_environment:
  - MATLAB_EXE
  - COMSOL_BIN
  - COMSOL_MLI_DIR
  optional_environment:
  - COMSOL_MPHSERVER_BIN
  - COMSOL_SERVER_HOST
  - COMSOL_SERVER_PORT
  require_path_exists: true
  require_matlab_execution: true
  required_object_roles:
  - physics_assignment_manifest
  - boundary_assignment_manifest
  - unit_policy
  required_manifest_sections:
  - source_config
  - schema_id
  - backend
  - contract
  - heat_rectangle
  - generated_files
  - expected_outputs
  - metrics
  - validation
  required_artifacts:
  - physics_assignment_manifest.json
  - boundary_assignment_manifest.json
  - unit_policy.json
  - matlab_c04_heat_rectangle_smoke.m
  - stdout.txt
  - stderr.txt
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
  no_claims:
  - C04 proves generated rectangle material, physics, boundary, and unit assignment runtime smoke only
  - C04 does not claim solver convergence, field correctness, official replay, double-v, or benchmark validation
  - local executable, license, server, and Application Library paths must remain environment-injected
