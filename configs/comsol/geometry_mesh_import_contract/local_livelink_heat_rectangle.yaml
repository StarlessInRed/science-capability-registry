capability_id: multiphysics.comsol.geometry_mesh_import_contract
asset_id: C03_geometry_mesh_import_contract
case_id: local_livelink_heat_rectangle
description: COMSOL C03 local MATLAB/LiveLink generated heat-rectangle geometry, mesh, and selection-map smoke.
depends_on:
- multiphysics.comsol.model_construction_api_contract
comsol:
  runtime_profile: local_matlab_comsol_preflight
  runtime_profile_config: configs/comsol/runtime_profiles/local_matlab_comsol_preflight.yaml
  command_env: COMSOL_BIN
  mphserver_env: COMSOL_MPHSERVER_BIN
  version_family: env_configured
matlab:
  executable_env: MATLAB_EXE
  batch_argument: -batch
livelink:
  mli_dir_env: COMSOL_MLI_DIR
  required_matlab_functions:
  - mphstart
  - mphevaluate
server:
  host_env: COMSOL_SERVER_HOST
  port_env: COMSOL_SERVER_PORT
  connection_mode: local_or_server
backend:
  type: matlab_livelink_heat_rectangle_smoke
  timeout_s: 300
contract:
  stage: geometry_mesh_import_contract
  scope: COMSOL C03 smoke creates a generated 2D heat rectangle, runs geometry and mesh generation, and emits geometry/mesh/selection handoff artifacts; no CAD import, solver execution, official replay, double-v, or benchmark validation is claimed.
  source_boundary: Consumes generated rectangle parameters and C02-style stable model tags only; no Application Library model is opened.
  declared_objects:
  - name: geometry_manifest
    role: geometry_manifest
    required: true
    description: Declares generated rectangle dimensions and source boundary for this smoke.
  - name: mesh_manifest
    role: mesh_manifest
    required: true
    description: Declares the COMSOL auto-mesh policy used for this generated rectangle.
  - name: selection_map
    role: selection_map
    required: true
    description: Declares generated rectangle boundary roles for downstream C04 assignment.
  artifacts:
  - path: geometry_manifest.json
    role: geometry source and entity smoke
    required: true
  - path: mesh_manifest.json
    role: mesh generation smoke
    required: true
  - path: selection_map.json
    role: named selection and boundary-role smoke
    required: true
  handoff_contract:
  - generated rectangle geometry must be created before mesh generation
  - selection_map must preserve boundary-role semantics for C04
  - mesh smoke must remain separate from mesh-quality or solver evidence
heat_rectangle:
  script_filename: matlab_c03_heat_rectangle_smoke.m
  tags:
    model_tag: c03_heat_rectangle
    component_tag: comp1
    geometry_tag: geom1
    rectangle_tag: rect1
    mesh_tag: mesh1
    material_tag: mat1
    physics_tag: ht
    temperature_boundary_tag: temp1
    study_tag: std1
    study_feature_tag: stat
  geometry:
    width: 1.0
    height: 0.5
    width_parameter: c03_width
    height_parameter: c03_height
  mesh:
    auto_mesh_size: 5
  physics:
    interface_type: HeatTransfer
    material_type: Common
    boundary_condition_type: TemperatureBoundary
    boundary_temperature: 300[K]
  study:
    study_type: Stationary
  probes:
  - name: center
    expression: T
    x: 0.5
    y: 0.25
    unit: K
    expected_value: 300.0
    tolerance: 1.0e-6
outputs:
  output_dir: _results/comsol/geometry_mesh_import_contract/local_livelink_heat_rectangle
  expected_outputs:
  - geometry_manifest.json
  - mesh_manifest.json
  - selection_map.json
  - matlab_c03_heat_rectangle_smoke.m
  - stdout.txt
  - stderr.txt
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
validation:
  gate: smoke
  required_environment:
  - MATLAB_EXE
  - COMSOL_BIN
  - COMSOL_MLI_DIR
  optional_environment:
  - COMSOL_MPHSERVER_BIN
  - COMSOL_SERVER_HOST
  - COMSOL_SERVER_PORT
  require_path_exists: true
  require_matlab_execution: true
  required_object_roles:
  - geometry_manifest
  - mesh_manifest
  - selection_map
  required_manifest_sections:
  - source_config
  - schema_id
  - backend
  - contract
  - heat_rectangle
  - generated_files
  - expected_outputs
  - metrics
  - validation
  required_artifacts:
  - geometry_manifest.json
  - mesh_manifest.json
  - selection_map.json
  - matlab_c03_heat_rectangle_smoke.m
  - stdout.txt
  - stderr.txt
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
  no_claims:
  - C03 proves generated rectangle geometry, mesh, and selection-map runtime smoke only
  - C03 does not claim CAD import robustness, mesh-quality validation, solver execution, official replay, double-v, or benchmark validation
  - local executable, license, server, and Application Library paths must remain environment-injected
