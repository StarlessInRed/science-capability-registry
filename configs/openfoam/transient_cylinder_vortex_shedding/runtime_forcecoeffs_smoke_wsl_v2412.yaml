capability_id: cfd.openfoam.transient_cylinder_vortex_shedding
case_id: runtime_forcecoeffs_smoke_wsl_v2412
description: Local WSL OpenFOAM.com v2412 native forceCoeffs smoke for the pimpleFoam cylinder2D tutorial.
openfoam:
  distribution: openfoam_com
  version: v2412
  runtime_profile: openfoam_com_v2412
  tutorial_path: $FOAM_TUTORIALS/incompressible/pimpleFoam/laminar/cylinder2D
  source_url: https://www.openfoam.com/documentation/tutorial-guide/2-incompressible-flow/2.2-flow-around-a-cylinder
  bashrc_path: /usr/lib/openfoam/openfoam2412/etc/bashrc
  case_layout: single_region
  required_executables:
  - blockMesh
  - snappyHexMesh
  - mirrorMesh
  - renumberMesh
  - redistributePar
  - pimpleFoam
  - postProcess
backend:
  type: wsl
  timeout_s: 1200
  parallel: false
  wsl_distro: Ubuntu-24.04
solver:
  name: pimpleFoam
  mode: transient_incompressible_laminar
  command_sequence:
  - ./Allrun.pre
  - pimpleFoam
template:
  source_path: /usr/lib/openfoam/openfoam2412/tutorials/incompressible/pimpleFoam/laminar/cylinder2D
  copy_strategy: copy_official_tutorial_then_patch
  disabled_function_objects:
  - DMD functionObjects are not required for the native forceCoeffs smoke gate.
geometry:
  cylinder_diameter_m: 0.12
  cylinder_center_m:
  - 0
  - 0
  domain_bounds_m:
    x_min: -0.6075
    x_max: 1.120002
    y_min: -0.6
    y_max: 0.6
  two_dimensional_thickness_m: 0.015
  patch_roles:
    inlet: velocity_inlet
    outlet: pressure_outlet
    cylinder: no_slip_wall
    topAndBottom: slip_or_farfield
    frontAndBack: empty
mesh:
  generator: blockMesh_snappyHexMesh_mirrorMesh
  template_dictionaries:
  - system/blockMeshDict.coarse
  - system/snappyHexMeshDict
  - system/blockMeshDict.main
  - system/mirrorMeshDict
  front_back_patch_type: empty
  workflow:
  - blockMesh -dict system/blockMeshDict.coarse
  - snappyHexMesh -overwrite
  - blockMesh -dict system/blockMeshDict.main
  - mirrorMesh -overwrite
  - restore0Dir
material:
  density_kg_m3: 1
  kinematic_viscosity_m2_s: 0.0012
  inlet_velocity_m_s: 1
  reynolds_number_D: 100
fields:
  velocity_field: U
  pressure_field: p
  initial_velocity_m_s:
  - 1
  - 0
  - 0
  initial_pressure_m2_s2: 0
numerics:
  control:
    end_time_s: 0.2
    delta_t_s: 0.0005
    write_interval_s: 0.01
    max_courant: 0.5
    adjust_time_step: true
    max_delta_t_s: 0.001
  pimple:
    n_outer_correctors: 2
    n_correctors: 2
    n_non_orthogonal_correctors: 0
function_objects:
  force_coefficients:
    enabled: true
    patches:
    - cylinder
    rho_inf_kg_m3: 1
    lift_dir:
    - 0
    - 1
    - 0
    drag_dir:
    - 1
    - 0
    - 0
postprocess:
  force_coefficients: true
  lift_drag_time_series: true
  strouhal_estimate: false
  force_extraction_source: openfoam_forceCoeffs
  strouhal_estimation_method: lift_peak_period
  frequency_cross_checks: []
outputs:
  output_dir: _results/openfoam/transient_cylinder_vortex_shedding/runtime_forcecoeffs_smoke_wsl_v2412
  retain_generated_case: true
  expected_outputs:
  - case/0/U
  - case/0/p
  - case/constant/transportProperties
  - case/constant/turbulenceProperties
  - case/system/controlDict
  - case/system/fvSchemes
  - case/system/fvSolution
  - case/system/snappyHexMeshDict
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
  - postprocess/force_coefficients.csv
validation:
  gate: smoke
  max_courant: 1
  max_final_residual: 0.01
  force_coefficients_required: true
  strouhal_target_range:
  - 0.16
  - 0.24
  min_force_samples: 3
  min_force_time_span_s: 0.02
  required_generated_files:
  - case/0/U
  - case/0/p
  - case/constant/transportProperties
  - case/constant/turbulenceProperties
  - case/system/controlDict
  - case/system/fvSchemes
  - case/system/fvSolution
  - case/system/snappyHexMeshDict
  required_manifest_sections:
  - source_config
  - schema_id
  - backend
  - solver
  - template
  - geometry
  - mesh
  - material
  - fields
  - numerics
  - function_objects
  - expected_outputs
  - validation_targets
  matrix_role: baseline
  expected_trend:
    description: v2412 native forceCoeffs smoke should produce finite coefficient time-series rows without claiming Strouhal validation.
