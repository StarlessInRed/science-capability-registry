profile_id: openfoam_com_v2112
distribution: openfoam_com
version_label: v2112
bashrc_path: /opt/OpenFOAM-v2112/etc/bashrc
case_layout: single_region
backend:
  type: wsl
  wsl_distro: Ubuntu-24.04
  timeout_s: 420
  parallel: false
executable_bindings:
  incompressible_laminar_transient: icoFoam
  incompressible_rans_steady: simpleFoam
  vof_free_surface_transient: interFoam
  mesh_block: blockMesh
  mesh_check: checkMesh
  field_initializer: setFields
  postprocess_driver: postProcess
required_executables:
- blockMesh
- checkMesh
- icoFoam
- simpleFoam
- interFoam
- setFields
- postProcess
tutorial_roots:
  c01_lid_driven_cavity: /opt/OpenFOAM-v2112/tutorials/incompressible/icoFoam/cavity/cavity
  c03_pitz_daily: /opt/OpenFOAM-v2112/tutorials/incompressible/simpleFoam/pitzDaily
  c06_dam_break: /opt/OpenFOAM-v2112/tutorials/multiphase/interFoam/laminar/damBreak/damBreak
known_limitations:
- Evidence collected on this host is OpenFOAM.com v2112 under WSL Ubuntu-24.04.
- FunctionObject and sampling writes can hit sha1 IO errors in this local WSL v2112 profile, including ext4 `/tmp` probe paths.
- This profile does not claim Foundation OpenFOAM compatibility.
