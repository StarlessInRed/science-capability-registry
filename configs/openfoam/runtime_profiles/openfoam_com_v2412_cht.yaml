profile_id: openfoam_com_v2412_cht
distribution: openfoam_com
version_label: v2412
bashrc_path: /usr/lib/openfoam/openfoam2412/etc/bashrc
case_layout: legacy_cht_multi_region
backend:
  type: wsl
  wsl_distro: Ubuntu-24.04
  timeout_s: 1200
  parallel: true
executable_bindings:
  cht_steady: chtMultiRegionSimpleFoam
  cht_transient: chtMultiRegionFoam
  mesh_block: blockMesh
  mesh_surface_features: surfaceFeatureExtract
  mesh_snappy: snappyHexMesh
  mesh_decompose: decomposePar
  mesh_split_regions: splitMeshRegions
  mesh_toposet: topoSet
  mesh_reconstruct: reconstructParMesh
  case_reconstruct: reconstructPar
  mesh_check: checkMesh
  dictionary_patch: changeDictionary
  radiation_face_agglomerate: faceAgglomerate
  radiation_view_factors: viewFactorsGen
  parallel_launcher: mpirun
  postprocess_driver: postProcess
required_executables:
- blockMesh
- surfaceFeatureExtract
- snappyHexMesh
- decomposePar
- splitMeshRegions
- topoSet
- changeDictionary
- faceAgglomerate
- viewFactorsGen
- reconstructParMesh
- reconstructPar
- checkMesh
- chtMultiRegionSimpleFoam
- chtMultiRegionFoam
- mpirun
- postProcess
tutorial_roots:
  c07_cpu_cabinet: /usr/lib/openfoam/openfoam2412/tutorials/heatTransfer/chtMultiRegionSimpleFoam/cpuCabinet
  c07_multi_region_heater_radiation: /usr/lib/openfoam/openfoam2412/tutorials/heatTransfer/chtMultiRegionSimpleFoam/multiRegionHeaterRadiation
  c07_external_coupled_heater: /usr/lib/openfoam/openfoam2412/tutorials/heatTransfer/chtMultiRegionSimpleFoam/externalCoupledHeater
  c07_heat_exchanger: /usr/lib/openfoam/openfoam2412/tutorials/heatTransfer/chtMultiRegionSimpleFoam/heatExchanger
known_limitations:
- Evidence collected on this host is OpenFOAM.com v2412 under WSL Ubuntu-24.04.
- This profile is for CHT multi-region cases and must not be used as the default single-region v2412 profile.
- It was added to test whether v2412 native wallHeatFlux avoids the v2112 local sha1 functionObject failure.
