capability_id: cfd.openfoam.compressible_shock_capturing_forward_step
case_id: baseline
description: Dry-run official rhoCentralFoam forwardStep template contract for C08.
openfoam:
  distribution: openfoam_com
  version: v2112
  runtime_profile: openfoam_com_v2112
  tutorial_path: $FOAM_TUTORIALS/compressible/rhoCentralFoam/forwardStep
  source_url: https://www.openfoam.com/documentation/guides/latest/doc/guide-applications-solvers-compressible-rhoCentralFoam.html
  bashrc_path: /opt/OpenFOAM-v2112/etc/bashrc
  case_layout: single_region
  required_executables:
  - blockMesh
  - checkMesh
  - rhoCentralFoam
backend:
  type: dry_run_only
  timeout_s: 420
  parallel: false
  wsl_distro: Ubuntu-24.04
solver:
  name: rhoCentralFoam
  mode: transient_compressible_shock_capturing
  command_sequence:
  - blockMesh
  - checkMesh
  - rhoCentralFoam
template:
  source_path: /opt/OpenFOAM-v2112/tutorials/compressible/rhoCentralFoam/forwardStep
  copy_strategy: copy_official_tutorial_then_patch
  disabled_function_objects: []
geometry:
  domain_length_m: 3.0
  domain_height_m: 1.0
  step_start_x_m: 0.6
  step_height_m: 0.2
  two_dimensional_thickness_m: 0.1
mesh:
  generator: blockMesh
  block_cell_counts:
  - [48, 16, 1]
  - [48, 64, 1]
  - [192, 64, 1]
  patch_roles:
    inlet: supersonic_inlet
    outlet: outflow
    bottom: symmetry_plane
    top: symmetry_plane
    obstacle: slip_forward_step
    defaultFaces: two_dimensional_empty
  refinement_scale: 1.0
thermophysical_properties:
  thermo_model: hePsiThermo
  equation_of_state: perfectGas
  energy_model: sensibleInternalEnergy
  transport_model: const
  gamma: 1.4
  mach_number: 3.0
  speed_of_sound_reference_m_s: 1.0
fields:
  U:
    dimensions: "[0 1 -1 0 0 0 0]"
    internal: "uniform (3 0 0)"
    initial_value: "(3 0 0)"
  p:
    dimensions: "[1 -1 -2 0 0 0 0]"
    internal: "uniform 1"
    initial_value: 1.0
  T:
    dimensions: "[0 0 0 1 0 0 0]"
    internal: "uniform 1"
    initial_value: 1.0
  rho:
    dimensions: "[1 -3 0 0 0 0 0]"
    source: derived_from_thermophysical_state
    runtime_output: true
boundary_conditions:
  inlet:
    U: fixedValue
    p: fixedValue
    T: fixedValue
  outlet:
    U: inletOutlet
    p: zeroGradient
    T: inletOutlet
  bottom:
    U: symmetryPlane
    p: symmetryPlane
    T: symmetryPlane
  top:
    U: symmetryPlane
    p: symmetryPlane
    T: symmetryPlane
  obstacle:
    U: slip
    p: zeroGradient
    T: zeroGradient
  defaultFaces:
    U: empty
    p: empty
    T: empty
numerics:
  control:
    start_time_s: 0.0
    end_time_s: 4.0
    delta_t_s: 0.002
    write_interval_s: 0.1
    adjust_time_step: true
    max_courant: 0.2
    max_delta_t_s: 1.0
  shock_capturing:
    flux_scheme: rhoCentralFoam tutorial central-upwind flux
    limiter_policy: official tutorial fvSchemes
postprocess:
  method: python_pressure_density_gradient
  shock_quantity: p
  sample_lines:
  - id: centerline
    axis: x
    fixed_coordinate_m: 0.5
  shock_search_window_m: [0.35, 0.50]
  upstream_window_m: [0.30, 0.40]
  downstream_window_m: [0.44, 0.55]
shock_reference:
  reference_policy: configured_reference_required_for_promotion
  normal_shock_relations_role: sanity_bounds_only
  shock_position_reference_m: null
  pressure_jump_ratio_reference: null
  density_jump_ratio_reference: null
outputs:
  output_dir: _results/openfoam/compressible_shock_capturing_forward_step/baseline
  retain_generated_case: true
  expected_outputs:
  - case/0/U
  - case/0/p
  - case/0/T
  - case/constant/thermophysicalProperties
  - case/system/blockMeshDict
  - case/system/controlDict
  - case/system/fvSchemes
  - case/system/fvSolution
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
  - logs/log.01_blockMesh
  - logs/log.02_checkMesh
  - logs/log.03_rhoCentralFoam
  - postprocess/shock_line_samples.csv
  - postprocess/shock_metrics.json
  - postprocess/conservation_summary.json
  - postprocess/boundary_flux_summary.csv
  - postprocess/face_flux_parity_summary.csv
validation:
  gate: static-readiness
  max_courant: 0.2
  minimum_final_time_s: 4.0
  min_pressure: 0.0
  min_temperature: 0.0
  min_density: 0.0
  max_shock_position_abs_error_m: 0.1
  max_jump_ratio_rel_error: 0.2
  max_boundary_flux_mass_imbalance_proxy: 0.03
  max_boundary_flux_total_energy_imbalance_proxy: 0.02
  required_generated_files:
  - case/0/U
  - case/0/p
  - case/0/T
  - case/constant/thermophysicalProperties
  - case/system/blockMeshDict
  - case/system/controlDict
  - case/system/fvSchemes
  - case/system/fvSolution
  required_manifest_sections:
  - source_config
  - schema_id
  - backend
  - generated_files
  - mesh_commands
  - solver_commands
  - postprocess_commands
  - expected_outputs
  - validation_targets
  - shock_reference
  - thermophysical_properties
  matrix_role: baseline
  expected_trend:
    description: Static contract reference for C08 forward-step shock-capturing metrics.
