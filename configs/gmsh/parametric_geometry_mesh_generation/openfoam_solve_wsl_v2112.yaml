capability_id: meshing.gmsh.parametric_geometry_mesh_generation
case_id: openfoam_solve_wsl_v2112
description: Gmsh Python API mesh generation, OpenFOAM.com v2112 gmshToFoam import, and minimal potentialFoam solve smoke.
gmsh:
  runtime_profile: python_api
  api: gmsh-python
  version_expectation: ">=4.12"
  source_url: https://gmsh.info/doc/texinfo/gmsh.html
backend:
  type: python_api
  timeout_s: 300
geometry:
  family: extruded_rectangle_channel_3d
  origin_m:
  - 0
  - 0
  length_m: 4
  height_m: 1
  thickness_m: 0.1
  characteristic_length_m: 0.2
physical_groups:
- name: inlet
  dimension: 2
  role: inlet
- name: outlet
  dimension: 2
  role: outlet
- name: wall
  dimension: 2
  role: wall
- name: frontAndBack
  dimension: 2
  role: front_back
- name: fluid_domain
  dimension: 3
  role: domain
mesh:
  dimension: 3
  element_order: 1
  algorithm: 6
  output_format: msh2
downstream_import:
  enabled: true
  engine: openfoam_gmshToFoam
  runtime_profile: openfoam_com_v2112
  bashrc_path: /opt/OpenFOAM-v2112/etc/bashrc
  wsl_distro: Ubuntu-24.04
  command: gmshToFoam case.msh
  expected_outputs:
  - system/controlDict
  - constant/polyMesh/points
  - constant/polyMesh/faces
  - constant/polyMesh/owner
  - constant/polyMesh/neighbour
  - constant/polyMesh/boundary
  - logs/log.gmshToFoam
  - downstream_import_summary.json
  expected_boundary_names:
  - inlet
  - outlet
  - wall
  - frontAndBack
  timeout_s: 300
downstream_solve:
  enabled: true
  engine: openfoam_potentialFoam
  runtime_profile: openfoam_com_v2112
  bashrc_path: /opt/OpenFOAM-v2112/etc/bashrc
  wsl_distro: Ubuntu-24.04
  application: potentialFoam
  command_sequence:
  - checkMesh -constant
  - potentialFoam -writep
  control:
    start_time: 0
    end_time: 20
    delta_t: 1
    write_interval: 20
  fields:
    inlet_velocity_m_s:
    - 1
    - 0
    - 0
    initial_pressure_m2_s2: 0
  numerics:
    div_phi_U: bounded Gauss linear
    div_div_phi_U: Gauss linear
    laplacian_default: Gauss linear corrected
    n_non_orthogonal_correctors: 2
  expected_outputs:
  - 0/U
  - 0/p
  - system/controlDict
  - system/fvSchemes
  - system/fvSolution
  - logs/log.checkMesh
  - logs/log.potentialFoam
  - downstream_solve_summary.json
  validation:
    require_check_mesh_ok: true
    max_continuity_error: 0.01
    required_boundary_names:
    - inlet
    - outlet
    - wall
    - frontAndBack
  timeout_s: 300
outputs:
  output_dir: _results/gmsh/parametric_geometry_mesh_generation/openfoam_solve_wsl_v2112
  expected_outputs:
  - case.geo
  - case.msh
  - mesh_summary.json
  - manifest.json
  - validation.json
  - validation_report.md
  - system/controlDict
  - constant/polyMesh/points
  - constant/polyMesh/faces
  - constant/polyMesh/owner
  - constant/polyMesh/neighbour
  - constant/polyMesh/boundary
  - logs/log.gmshToFoam
  - downstream_import_summary.json
  - 0/U
  - 0/p
  - system/fvSchemes
  - system/fvSolution
  - logs/log.checkMesh
  - logs/log.potentialFoam
  - downstream_solve_summary.json
validation:
  gate: smoke
  required_physical_groups:
  - inlet
  - outlet
  - wall
  - frontAndBack
  - fluid_domain
  required_generated_files:
  - case.geo
  required_manifest_sections:
  - source_config
  - schema_id
  - backend
  - gmsh
  - geometry
  - physical_groups
  - mesh
  - downstream_import
  - downstream_solve
  - generated_files
  - expected_outputs
  - validation_targets
  min_node_count: 4
  min_element_count: 2
  min_quality_proxy: 0.05
  require_coordinate_finiteness: true
