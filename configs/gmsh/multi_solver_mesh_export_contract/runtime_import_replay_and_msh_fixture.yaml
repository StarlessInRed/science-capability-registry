capability_id: meshing.gmsh.multi_solver_mesh_export_contract
case_id: runtime_import_replay_and_msh_fixture
description: Replay freshly regenerated OpenFOAM import evidence and run meshio FEM import over a Gmsh .msh file as C06 multi-solver consumability smoke evidence.
gmsh:
  runtime_profile: multi_solver_export_contract
  source_url: https://gmsh.info/doc/texinfo/gmsh.html
backend:
  type: dry_run_only
  timeout_s: 60
source_mesh:
  source_capability_id: meshing.gmsh.parametric_geometry_mesh_generation
  source_case_id: runtime_rectangle_channel_python_api
  boundary_contract_id: meshing.gmsh.boundary_physical_group_contract
  quality_contract_id: meshing.gmsh.mesh_refinement_quality_trend
  source_format: msh2
unit_policy:
  source_unit: m
  target_unit: m
  scale_factor: 1.0
  require_unit_scale_match: true
orientation_policy:
  require_positive_orientation: true
  allow_element_reordering: true
export_targets:
- target_id: openfoam_gmshToFoam
  solver_family: cfd
  target_solver: openfoam
  export_format: polyMesh
  contract_status: import_smoke_passed
  expected_boundary_names:
  - inlet
  - outlet
  - wall
  expected_element_count_min: 240
  max_element_count_delta_fraction: 0.02
- target_id: meshio_msh_fem_import
  solver_family: fem
  target_solver: generic
  export_format: msh2
  contract_status: import_smoke_passed
  expected_boundary_names:
  - inlet
  - outlet
  - wall
  expected_element_count_min: 240
  max_element_count_delta_fraction: 0.02
import_observations:
- target_id: openfoam_gmshToFoam
  summary_kind: openfoam_downstream_import
  source_summary_path: _results/gmsh/parametric_geometry_mesh_generation/openfoam_import_wsl_v2112/downstream_import_summary.json
  expected_status: passed
- target_id: meshio_msh_fem_import
  summary_kind: meshio_fem_import
  source_summary_path: _results/gmsh/mesh_refinement_quality_trend/runtime_rectangle_channel_python_api/levels/fine/case.msh
  expected_status: passed
outputs:
  output_dir: _results/gmsh/multi_solver_mesh_export_contract/runtime_import_replay_and_msh_fixture
  expected_outputs:
  - export_manifest.json
  - format_matrix.csv
  - solver_import_summary.json
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
validation:
  gate: smoke
  required_target_ids:
  - openfoam_gmshToFoam
  - meshio_msh_fem_import
  required_boundary_names:
  - inlet
  - outlet
  - wall
  min_solver_family_count: 2
  required_manifest_sections:
  - source_config
  - schema_id
  - backend
  - gmsh
  - source_mesh
  - unit_policy
  - orientation_policy
  - export_targets
  - generated_files
  - expected_outputs
  - validation_targets
  required_artifacts:
  - export_manifest.json
  - format_matrix.csv
  - solver_import_summary.json
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
