capability_id: cfd.fluent.heat_transfer_energy_balance
case_id: heat_exchanger_case_data_read_smoke
description: Fluent case/data thermal-report smoke for the official 2D heat-exchanger tutorial pair; extracts temperature extrema, inlet/outlet temperatures, and heat-transfer flux balance.
source_root:
  source_root_env: FLUENT_TUTORIAL_ROOT
  logical_path: AgentKnowledge/case_library/fluent/cases/official_tutorials
fluent:
  runtime_profile: local_fluent_preflight
  runtime_profile_config: configs/fluent/runtime_profiles/local_fluent_preflight.yaml
  vendor: Ansys
  product: Fluent
  version_family: 2025_R1
  executable_env: FLUENT_EXE
  dimension_precision: 2ddp
  headless_flags:
  - -g
  processor_count: 1
  journal_argument: -i
backend:
  type: fluent_case_data_read_smoke
  archive_access: read_only_zip
  timeout_s: 180
source_package:
  source_id: C07_heat_exchanger
  rel_path: Fluent_Tutorial_Package/2d_heat_exchanger_optimizer.zip
  package_role: official 2D heat-exchanger tutorial case/data pair
thermal_scope:
  model_class: Fluent heat-transfer case/data thermal-report smoke
  readiness_scope: Read the matched case/data pair in Fluent batch mode, verify mesh/check, and extract temperature plus heat-transfer flux reports.
  future_runtime_metrics:
  - temperature_min_max
  - energy_balance_error
  - material_region_count
  no_homology_claims:
  - thermal reports do not imply CHT interface validation
runtime_smoke:
  case_entry: 2d_heat_exchanger_optimizer/2d_heat_exchanger.cas.h5
  data_entry: 2d_heat_exchanger_optimizer/2d_heat_exchanger.dat.h5
  journal_file: journal.jou
  max_warning_count: 20
  thermal_reports:
    cell_zone: fluid
    temperature_surfaces:
    - inlet
    - outlet
    heat_transfer_flux_all_boundaries: true
    max_energy_balance_relative_error: 0.01
  scope: Extract the matched case/data pair to runtime output, read it in Fluent, run mesh/check, and report temperature extrema plus heat-transfer flux balance.
outputs:
  output_dir: _results/fluent/heat_transfer_energy_balance/heat_exchanger_case_data_read_smoke
  expected_outputs:
  - heat_transfer_source_manifest.json
  - case_data_entries.json
  - 2d_heat_exchanger.cas.h5
  - 2d_heat_exchanger.dat.h5
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
validation:
  gate: smoke
  required_entry_classes:
  - case
  - data
  min_case_data_pairs: 1
  required_artifacts:
  - heat_transfer_source_manifest.json
  - case_data_entries.json
  - 2d_heat_exchanger.cas.h5
  - 2d_heat_exchanger.dat.h5
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
  no_claims:
  - no CHT interface continuity validation is claimed
  - no battery thermal validation is inferred from this heat-exchanger tutorial
  - heat-transfer balance is scoped to Fluent flux report closure for this official case/data pair only
