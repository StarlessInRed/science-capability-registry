capability_id: cfd.fluent.heat_transfer_energy_balance
case_id: heat_exchanger_case_data_read_smoke
description: Fluent case/data read smoke for the official 2D heat-exchanger tutorial pair; this does not claim heat-rate balance validation.
source_root:
  source_root_env: FLUENT_TUTORIAL_ROOT
  logical_path: AgentKnowledge/case_library/fluent/cases/official_tutorials
fluent:
  runtime_profile: local_fluent_preflight
  runtime_profile_config: configs/fluent/runtime_profiles/local_fluent_preflight.yaml
  vendor: Ansys
  product: Fluent
  version_family: 2025_R1
  executable_env: FLUENT_EXE
  dimension_precision: 2ddp
  headless_flags:
  - -g
  processor_count: 1
  journal_argument: -i
backend:
  type: fluent_case_data_read_smoke
  archive_access: read_only_zip
  timeout_s: 180
source_package:
  source_id: C07_heat_exchanger
  rel_path: Fluent_Tutorial_Package/2d_heat_exchanger_optimizer.zip
  package_role: official 2D heat-exchanger tutorial case/data pair
thermal_scope:
  model_class: Fluent heat-transfer case/data read smoke before thermal metric extraction
  readiness_scope: Read the matched case/data pair in Fluent batch mode and verify mesh/check before temperature and heat-rate reports are added.
  future_runtime_metrics:
  - temperature_min_max
  - heat_rate_inlet_outlet
  - energy_balance_error
  - material_region_count
  no_homology_claims:
  - case/data read success does not imply heat-rate balance or CHT interface validation
  - thermal report commands remain a separate postprocess prompt contract
runtime_smoke:
  case_entry: 2d_heat_exchanger_optimizer/2d_heat_exchanger.cas.h5
  data_entry: 2d_heat_exchanger_optimizer/2d_heat_exchanger.dat.h5
  journal_file: journal.jou
  max_warning_count: 20
  scope: Extract the matched case/data pair to runtime output, read it in Fluent, run mesh/check, and stop before thermal reports.
outputs:
  output_dir: _results/fluent/heat_transfer_energy_balance/heat_exchanger_case_data_read_smoke
  expected_outputs:
  - heat_transfer_source_manifest.json
  - case_data_entries.json
  - 2d_heat_exchanger.cas.h5
  - 2d_heat_exchanger.dat.h5
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
validation:
  gate: smoke
  required_entry_classes:
  - case
  - data
  min_case_data_pairs: 1
  required_artifacts:
  - heat_transfer_source_manifest.json
  - case_data_entries.json
  - 2d_heat_exchanger.cas.h5
  - 2d_heat_exchanger.dat.h5
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
  no_claims:
  - no heat-rate balance, temperature extrema, or CHT interface continuity validation is claimed
  - no battery thermal validation is inferred from this heat-exchanger tutorial
  - no thermal postprocess command is claimed until report prompts are closed
