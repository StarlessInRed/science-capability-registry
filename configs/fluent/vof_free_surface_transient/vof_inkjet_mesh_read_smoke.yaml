capability_id: cfd.fluent.vof_free_surface_transient
case_id: vof_inkjet_mesh_read_smoke
description: Fluent mesh-read smoke for the official VOF inkjet mesh; this proves mesh import only, not transient VOF physics.
source_root:
  source_root_env: FLUENT_TUTORIAL_ROOT
  logical_path: AgentKnowledge/case_library/fluent/cases/official_tutorials
fluent:
  runtime_profile: local_fluent_preflight
  runtime_profile_config: configs/fluent/runtime_profiles/local_fluent_preflight.yaml
  vendor: Ansys
  product: Fluent
  version_family: 2025_R1
  executable_env: FLUENT_EXE
  dimension_precision: 2ddp
  headless_flags:
  - -g
  processor_count: 1
  journal_argument: -i
backend:
  type: fluent_mesh_read_smoke
  archive_access: read_only_zip
  timeout_s: 120
source_package:
  source_id: C05_vof_mesh
  rel_path: Fluent_Tutorial_Package/vof.zip
  package_role: official VOF tutorial mesh-only setup seed
setup_scope:
  model_class: Fluent VOF/free-surface transient setup seed
  readiness_scope: Confirm the official mesh can be imported by Fluent before completed VOF phase setup and transient controls are generated.
  future_runtime_metrics:
  - max_volume_fraction_overshoot
  - phase_volume_error
  - interface_position
  - final_time
  no_homology_claims:
  - this mesh-read smoke does not contain VOF model setup, phases, initialization, or transient controls
  - successful mesh import does not imply alpha boundedness or water-volume conservation
runtime_smoke:
  mesh_entry: vof/inkjet.msh
  journal_file: journal.jou
  max_warning_count: 8
  scope: Extract inkjet.msh to runtime output, read it in Fluent, run mesh/check, and stop before any VOF solve.
outputs:
  output_dir: _results/fluent/vof_free_surface_transient/vof_inkjet_mesh_read_smoke
  expected_outputs:
  - vof_setup_manifest.json
  - mesh_entries.json
  - inkjet.msh
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
validation:
  gate: smoke
  required_entry_classes:
  - mesh
  min_mesh_entries: 1
  required_artifacts:
  - vof_setup_manifest.json
  - mesh_entries.json
  - inkjet.msh
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
  no_claims:
  - no Fluent VOF transient solver replay is launched by this config
  - no alpha boundedness, phase conservation, interface motion, or probe pressure validation is claimed
  - no completed case/data replay is claimed because vof.zip is mesh-only
