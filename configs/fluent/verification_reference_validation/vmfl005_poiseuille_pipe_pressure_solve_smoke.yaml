capability_id: cfd.fluent.verification_reference_validation
case_id: vmfl005_poiseuille_pipe_pressure_solve_smoke
description: Self-generated VMFL005 Poiseuille pipe axisymmetric laminar solve smoke for Fluent C02, with pressure-drop extraction intentionally unclaimed.
fluent:
  runtime_profile: local_fluent_preflight
  runtime_profile_config: configs/fluent/runtime_profiles/local_fluent_preflight.yaml
  vendor: Ansys
  product: Fluent
  version_family: 2025_R1
  executable_env: FLUENT_EXE
  dimension_precision: 2ddp
  headless_flags:
  - -g
  processor_count: 1
  journal_argument: -i
backend:
  type: fluent_pressure_solve_smoke
  timeout_s: 120
reference_source:
  source_role: verification_manual_reference
  source_root: AgentKnowledge/case_library/fluent/cases/official_tutorials
  document: ansys_fluid_dynamics_verification_manual.pdf
  manual_release: 2021_R1
  manual_case_id: VMFL005
  manual_case_title: Poiseuille Flow in a Pipe
  input_file_hint: poiseuille-flow.cas
  runnable_payload_status: not_found_in_current_library
  reference_scope: Self-generated solve uses VMFL005 geometry, material, and mean velocity; no local official poiseuille-flow.cas payload is claimed.
governing_model:
  model_class: self-generated Fluent solve smoke with verification-manual analytical reference
  flow_regime: steady laminar incompressible pipe flow
  equation_family: incompressible Navier-Stokes with Hagen-Poiseuille pressure-drop reference
  assumptions:
  - steady flow
  - constant density and viscosity
  - uniform inlet velocity is used for this smoke; fully developed inlet profile remains pending for benchmark promotion
  - half of the axisymmetric domain represents the circular tube
geometry:
  length_m: 0.1
  radius_m: 0.00125
  domain_assumption: 2D axisymmetric half-domain pipe mesh
material_properties:
  density_kg_m3: 1.0
  dynamic_viscosity_kg_m_s: 1.0e-5
boundary_conditions:
  inlet_profile: uniform velocity inlet for solve-smoke only; fully developed parabolic inlet remains pending for benchmark promotion
  inlet_average_velocity_m_s: 2.0
  wall: no-slip pipe wall
  axis: Fluent axisymmetric centerline
  outlet_closure: pressure outlet from generated mesh zone; pressure-drop surface integral command remains unresolved
reference_formula:
  formula_id: hagen_poiseuille_pressure_drop
  formula: delta_p = 32 * mu * L * U_mean / D^2
  pressure_drop_inputs:
    dynamic_viscosity_kg_m_s: 1.0e-5
    length_m: 0.1
    mean_velocity_m_s: 2.0
    diameter_m: 0.0025
reference_values:
  quantity: pressure_drop
  unit: Pa
  target_pressure_drop_pa: 10.24
  manual_fluent_pressure_drop_pa: 10.22
  manual_fluent_ratio: 0.998
sampling_policy:
  metric_location: pressure difference between inlet and outlet after surface-integral prompt contract closure
  homology_policy: geometry, material, axisymmetric model state, inlet profile, and pressure-drop sampling must match VMFL005 before benchmark promotion
  future_mesh_levels:
  - coarse
  - baseline
  - refined
mesh_generation:
  mesh_file: pipe_axisymmetric_mesh.msh
  axial_cells: 80
  radial_cells: 16
  zone_names:
    fluid: fluid
    interior: interior
    wall: wall
    axis: axis
    outlet: outlet
    inlet: inlet
runtime_smoke:
  journal_file: journal.jou
  write_case: false
  case_file: pipe_axisymmetric_mesh.cas
  max_warning_count: 4
  allowed_warning_fragments:
  - axis boundary conditions is not appropriate for planar solver state before axisymmetric setup is applied
  scope: Read the self-generated Fluent mesh, apply axisymmetric laminar setup, run bounded iterations, and do not claim pressure-drop extraction.
solver_setup:
  model_state: axisymmetric
  viscous_model: laminar
  max_iterations: 50
  max_final_continuity_residual: 0.001
  max_final_velocity_residual: 0.0001
  pressure_report_status: report_command_not_closed
outputs:
  output_dir: _results/fluent/verification_reference_validation/vmfl005_poiseuille_pipe_pressure_solve_smoke
  expected_outputs:
  - reference_manifest.json
  - pipe_axisymmetric_mesh.msh
  - mesh_manifest.json
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
validation:
  gate: smoke
  max_manual_relative_error: 0.03
  required_manifest_sections:
  - reference_source
  - governing_model
  - geometry
  - material_properties
  - boundary_conditions
  - reference_formula
  - reference_values
  - sampling_policy
  - validation_targets
  - mesh_generation
  - runtime_smoke
  - solver_setup
  required_artifacts:
  - reference_manifest.json
  - pipe_axisymmetric_mesh.msh
  - mesh_manifest.json
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
  no_claims:
  - no official local VMFL005 poiseuille-flow.cas payload is claimed
  - no pressure-drop value extraction is claimed by this solve smoke
  - no benchmark validation promotion is claimed until pressure sampling, fully developed inlet homology, and mesh trend closure pass
