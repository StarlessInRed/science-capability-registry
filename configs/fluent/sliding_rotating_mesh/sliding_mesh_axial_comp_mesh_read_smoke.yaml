capability_id: cfd.fluent.sliding_rotating_mesh
case_id: sliding_mesh_axial_comp_mesh_read_smoke
description: Fluent mesh-read smoke for the official sliding_mesh axial compressor mesh; this proves mesh import only, not moving-zone runtime.
source_root:
  source_root_env: FLUENT_TUTORIAL_ROOT
  logical_path: AgentKnowledge/case_library/fluent/cases/official_tutorials
fluent:
  runtime_profile: local_fluent_preflight
  runtime_profile_config: configs/fluent/runtime_profiles/local_fluent_preflight.yaml
  vendor: Ansys
  product: Fluent
  version_family: 2025_R1
  executable_env: FLUENT_EXE
  dimension_precision: 3ddp
  headless_flags:
  - -g
  processor_count: 1
  journal_argument: -i
backend:
  type: fluent_mesh_read_smoke
  archive_access: read_only_zip
  timeout_s: 120
source_packages:
- source_id: C06_sliding_mesh
  source_role: official sliding-mesh tutorial mesh-only seed
  rel_path: Fluent_Tutorial_Package/sliding_mesh.zip
- source_id: C06_single_rotating_legacy
  source_role: legacy single-rotating mesh-only supplement
  rel_path: legacy_2020_r2_unique/single_rotating.zip
setup_scope:
  model_class: Fluent sliding mesh and rotating reference frame setup seed
  readiness_scope: Confirm the official axial compressor mesh can be imported by Fluent before moving-zone and interface setup are generated.
  future_runtime_metrics:
  - moving_zone_count
  - interface_pair_count
  - completed_revolutions
  - monitored_periodicity_error
  no_homology_claims:
  - mesh-read smoke does not contain moving-zone settings, sliding interfaces, time step, or monitors
  - successful mesh import does not imply rotating machinery runtime validation
runtime_smoke:
  source_id: C06_sliding_mesh
  mesh_entry: sliding_mesh/axial_comp.msh
  journal_file: journal.jou
  max_warning_count: 10
  scope: Extract axial_comp.msh to runtime output, read it in Fluent, run mesh/check, and stop before any moving-zone setup.
outputs:
  output_dir: _results/fluent/sliding_rotating_mesh/sliding_mesh_axial_comp_mesh_read_smoke
  expected_outputs:
  - rotating_mesh_setup_manifest.json
  - mesh_entries.json
  - axial_comp.msh
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
validation:
  gate: smoke
  required_source_ids:
  - C06_sliding_mesh
  - C06_single_rotating_legacy
  required_entry_classes:
  - mesh
  min_mesh_entries: 2
  required_artifacts:
  - rotating_mesh_setup_manifest.json
  - mesh_entries.json
  - axial_comp.msh
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
  no_claims:
  - no Fluent sliding-mesh or rotating-zone solver replay is launched by this config
  - no moving-zone settings, sliding interface, periodicity, or transient history validation is claimed
  - legacy single-rotating mesh evidence remains labeled as legacy supplement
