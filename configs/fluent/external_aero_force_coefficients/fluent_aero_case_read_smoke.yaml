capability_id: cfd.fluent.external_aero_force_coefficients
case_id: fluent_aero_case_read_smoke
description: Fluent case-read smoke for the official external-aero tutorial case; this does not claim force or Cp validation.
source_root:
  source_root_env: FLUENT_TUTORIAL_ROOT
  logical_path: AgentKnowledge/case_library/fluent/cases/official_tutorials
fluent:
  runtime_profile: local_fluent_preflight
  runtime_profile_config: configs/fluent/runtime_profiles/local_fluent_preflight.yaml
  vendor: Ansys
  product: Fluent
  version_family: 2025_R1
  executable_env: FLUENT_EXE
  dimension_precision: 3ddp
  headless_flags:
  - -g
  processor_count: 1
  journal_argument: -i
backend:
  type: fluent_case_read_smoke
  archive_access: read_only_zip
  timeout_s: 180
source_package:
  source_id: C04_aero_tutorial
  rel_path: Fluent_Tutorial_Package/fluent_aero_tutorial.zip
  package_role: official external-aero tutorial bundle containing meshes, case files, design tables, and reference CSVs
governing_model:
  model_class: external-aerodynamics case-read smoke before force and pressure-coefficient replay
  solver_context: Fluent external-aero tutorial case file is read in batch mode to verify runtime compatibility.
  reference_scope: This config parses reference CSVs and reads the tutorial case; it does not iterate or extract force reports.
  homology_requirements:
  - future solver replay must match geometry, angle of attack, Mach or Reynolds setting, turbulence model, and section station before comparing Cp or Cl
  - lift-curve and Cp section data are reference tables for replay validation, not standalone proof of solver correctness
runtime_smoke:
  case_entry: fluent_aero_tutorial/IRT-Swept-Tail-Wing.cas.h5
  journal_file: journal.jou
  max_warning_count: 20
  scope: Extract the official IRT swept-tail-wing case to runtime output, read it in Fluent, run mesh/check, and stop before force/Cp extraction.
outputs:
  output_dir: _results/fluent/external_aero_force_coefficients/fluent_aero_case_read_smoke
  expected_outputs:
  - aero_reference_manifest.json
  - reference_tables.json
  - IRT-Swept-Tail-Wing.cas.h5
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
reference_csvs:
- reference_id: onera_cl_vs_aoa
  reference_role: lift_curve
  entry_path: fluent_aero_tutorial/reference_data/ref-onera-wing-Cl-vs-AoA.csv
  required_columns:
  - AoA [deg]
  - Cl
  min_rows: 7
- reference_id: onera_cp_7p5deg_section_z0p25m
  reference_role: pressure_coefficient_section
  entry_path: fluent_aero_tutorial/reference_data/ref-onera-wing-Cp-7.5deg-section-z0.25m.csv
  required_columns:
  - x
  - Pressure Coefficient
  min_rows: 10
- reference_id: irt_swept_wing_cp_massflow_313_section_z0p6m
  reference_role: pressure_coefficient_section
  entry_path: fluent_aero_tutorial/reference_data/ref-irt-swept-wing-Cp-massflow-313-section-z0.6m.csv
  required_columns:
  - x
  - Pressure Coefficient
  min_rows: 10
validation:
  gate: smoke
  required_entry_classes:
  - case
  - mesh
  - reference_csv
  - design_or_table_csv
  required_artifacts:
  - aero_reference_manifest.json
  - reference_tables.json
  - IRT-Swept-Tail-Wing.cas.h5
  - journal.jou
  - stdout.txt
  - stderr.txt
  - transcript.txt
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
  required_reference_roles:
  - lift_curve
  - pressure_coefficient_section
  trend_checks:
  - lift_curve_cl_monotonic_non_decreasing
  no_claims:
  - no Fluent force or Cp report extraction is claimed by this config
  - no mesh-independent external-aero benchmark validation is claimed
  - Cp comparison remains pending until a replayed case declares matching geometry, AoA, flow regime, and section station
