capability_id: cfd.fluent.mesh_convergence_trend
case_id: c02_pressure_drop_refinement_runtime_smoke
description: Runtime mesh-refinement smoke using the C02 self-generated Poiseuille pipe pressure-solve path; this records pressure-drop trend evidence and the uniform-inlet homology gap.
backend:
  type: c02_pressure_drop_refinement_runtime_smoke
  execution_mode: local_fluent_batch
runtime_basis:
  template_config: configs/fluent/verification_reference_validation/vmfl005_poiseuille_pipe_pressure_solve_smoke.yaml
  fluent_executable_env: FLUENT_EXE
  level_output_prefix: _results/fluent/mesh_convergence_trend/c02_pressure_drop_refinement_runtime_smoke
  max_iterations: 100
source_basis:
- source_id: c02_vmfl005_generated_pipe
  source_role: self_generated_mesh_family
  source_path: configs/fluent/verification_reference_validation/vmfl005_poiseuille_pipe_pressure_solve_smoke.yaml
  use_scope: Provides the self-generated axisymmetric pipe mesh and pressure-solve runner used for each refinement level.
- source_id: c01_legacy_elbow_runtime_seed
  source_role: runtime_reference_seed
  source_path: configs/fluent/steady_internal_flow_runtime/local_v251_elbow_smoke.yaml
  use_scope: Provides an already-running Fluent batch envelope and residual parser seed.
- source_id: fluent_adaptation_official_candidate
  source_role: official_adaptation_candidate
  source_path: AgentKnowledge/case_library/fluent/cases/official_tutorials/Fluent_Tutorial_Package/fluent_adaptation.zip
  use_scope: Official adaptation source candidate for later replay, not executed by this runtime smoke.
mesh_levels:
- level_id: coarse
  refinement_index: 0
  nominal_cell_count: 320
  relative_cell_size: 2.0
  input_role: generated_perturbation
  runtime_status: configured_for_runtime_smoke
  axial_cells: 40
  radial_cells: 8
- level_id: baseline
  refinement_index: 1
  nominal_cell_count: 1280
  relative_cell_size: 1.0
  input_role: generated_perturbation
  runtime_status: configured_for_runtime_smoke
  axial_cells: 80
  radial_cells: 16
- level_id: refined
  refinement_index: 2
  nominal_cell_count: 5120
  relative_cell_size: 0.5
  input_role: generated_perturbation
  runtime_status: configured_for_runtime_smoke
  axial_cells: 160
  radial_cells: 32
monitored_quantities:
- quantity_id: pressure_drop_pa
  canonical_quantity: inlet-to-outlet pressure drop
  unit: Pa
  trend_expectation: values should remain finite and adjacent changes should be bounded; analytical VMFL005 convergence is not claimed with the uniform inlet.
  status: pending_runtime_values
- quantity_id: final_continuity_residual
  canonical_quantity: final continuity residual
  unit: dimensionless
  trend_expectation: each level should meet the C02 solve-smoke residual gate within the configured iteration budget.
  status: pending_runtime_values
- quantity_id: monitored_quantity_delta
  canonical_quantity: normalized adjacent pressure-drop delta
  unit: dimensionless
  trend_expectation: adjacent-level pressure-drop changes should be bounded and reported as uniform-inlet trend evidence.
  status: pending_runtime_values
failure_classification:
- failure_class: mesh_generation_failure
  description: A level cannot generate or import a valid mesh with expected zones.
- failure_class: fluent_runtime_failure
  description: Fluent cannot read, initialize, iterate, or sample pressure under the configured runtime profile.
- failure_class: parser_failure
  description: Solver output exists but canonical pressure-drop or residual metrics cannot be extracted.
- failure_class: trend_validation_failure
  description: Extracted metrics are finite but adjacent pressure-drop changes exceed the smoke bound or lack a documented physical explanation.
outputs:
  output_dir: _results/fluent/mesh_convergence_trend/c02_pressure_drop_refinement_runtime_smoke
  expected_outputs:
  - trend_contract.json
  - refinement_matrix.csv
  - runtime_levels.json
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
validation:
  gate: smoke
  min_mesh_levels: 3
  require_all_level_validations_pass: true
  max_pressure_drop_relative_error: 0.3
  max_adjacent_pressure_drop_change: 0.08
  required_source_roles:
  - self_generated_mesh_family
  - official_adaptation_candidate
  - runtime_reference_seed
  required_monitored_quantities:
  - pressure_drop_pa
  - final_continuity_residual
  - monitored_quantity_delta
  required_failure_classes:
  - mesh_generation_failure
  - fluent_runtime_failure
  - parser_failure
  - trend_validation_failure
  required_artifacts:
  - trend_contract.json
  - refinement_matrix.csv
  - runtime_levels.json
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
  no_claims:
  - no official fluent_adaptation.zip runtime replay is executed by this smoke
  - no VMFL005 analytical benchmark promotion is claimed because the C02 inlet profile is uniform, not fully developed
  - this runtime trend is evidence for reproducible mesh-level execution and pressure sampling, not analytical convergence
