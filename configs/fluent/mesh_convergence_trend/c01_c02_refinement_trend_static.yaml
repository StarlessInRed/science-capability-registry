capability_id: cfd.fluent.mesh_convergence_trend
case_id: c01_c02_refinement_trend_static
description: Static mesh convergence trend contract for Fluent C03 using C01/C02 generated-mesh families plus the official adaptation tutorial as a future replay candidate.
backend:
  type: mesh_trend_static
  execution_mode: no_solver_execution
source_basis:
- source_id: c02_vmfl005_generated_pipe
  source_role: self_generated_mesh_family
  source_path: configs/fluent/verification_reference_validation/vmfl005_poiseuille_pipe_pressure_solve_smoke.yaml
  use_scope: Provides a small self-generated mesh family where refinement levels can be produced deterministically.
- source_id: c01_legacy_elbow_runtime_seed
  source_role: runtime_reference_seed
  source_path: configs/fluent/steady_internal_flow_runtime/local_v251_elbow_smoke.yaml
  use_scope: Provides an already-running Fluent batch envelope and residual parser seed.
- source_id: fluent_adaptation_official_candidate
  source_role: official_adaptation_candidate
  source_path: AgentKnowledge/case_library/fluent/cases/official_tutorials/Fluent_Tutorial_Package/fluent_adaptation.zip
  use_scope: Official adaptation source candidate for later replay, not executed by this static contract.
mesh_levels:
- level_id: coarse
  refinement_index: 0
  nominal_cell_count: 320
  relative_cell_size: 2.0
  input_role: generated_perturbation
  runtime_status: pending_fluent_runtime
- level_id: baseline
  refinement_index: 1
  nominal_cell_count: 1280
  relative_cell_size: 1.0
  input_role: generated_perturbation
  runtime_status: pending_fluent_runtime
- level_id: refined
  refinement_index: 2
  nominal_cell_count: 5120
  relative_cell_size: 0.5
  input_role: generated_perturbation
  runtime_status: pending_fluent_runtime
monitored_quantities:
- quantity_id: pressure_drop_pa
  canonical_quantity: inlet-to-outlet pressure drop
  unit: Pa
  trend_expectation: values should approach the analytical or reference target as cell size decreases after pressure sampling is closed
  status: pending_runtime_values
- quantity_id: final_continuity_residual
  canonical_quantity: final continuity residual
  unit: dimensionless
  trend_expectation: residual behavior should remain bounded and explainable across refinement levels
  status: pending_runtime_values
- quantity_id: monitored_quantity_delta
  canonical_quantity: normalized delta between adjacent refinement levels
  unit: dimensionless
  trend_expectation: adjacent-level delta should shrink or be physically explained before targeted-regression promotion
  status: pending_runtime_values
failure_classification:
- failure_class: mesh_generation_failure
  description: A level cannot generate or import a valid mesh with expected zones.
- failure_class: fluent_runtime_failure
  description: Fluent cannot read, initialize, or iterate the level under the configured runtime profile.
- failure_class: parser_failure
  description: Solver output exists but canonical metrics cannot be extracted.
- failure_class: trend_validation_failure
  description: Extracted metrics are finite but the trend is non-monotonic or lacks a documented physical explanation.
outputs:
  output_dir: _results/fluent/mesh_convergence_trend/c01_c02_refinement_trend_static
  expected_outputs:
  - trend_contract.json
  - refinement_matrix.csv
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
validation:
  gate: static-readiness
  min_mesh_levels: 3
  required_source_roles:
  - self_generated_mesh_family
  - official_adaptation_candidate
  - runtime_reference_seed
  required_monitored_quantities:
  - pressure_drop_pa
  - final_continuity_residual
  - monitored_quantity_delta
  required_failure_classes:
  - mesh_generation_failure
  - fluent_runtime_failure
  - parser_failure
  - trend_validation_failure
  required_artifacts:
  - trend_contract.json
  - refinement_matrix.csv
  - metrics.json
  - validation.json
  - validation_report.md
  - manifest.json
  no_claims:
  - no Fluent mesh convergence runtime is executed by this static contract
  - no monotonic numerical convergence or benchmark promotion is claimed without three solved levels
  - official fluent_adaptation.zip is a replay candidate, not a completed adaptation validation
