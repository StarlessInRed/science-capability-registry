asset_id: C04_physics_boundary_assignment_contract
software: COMSOL
source_url: https://www.comsol.com/livelink-for-matlab
domain: multiphysics
capability_name: physics and boundary assignment contract
problem_type:
  category: physics interface, material, boundary, and initial-condition assignment
  description: Verify that MATLAB-driven COMSOL model construction assigns complete physics, materials, boundary conditions, and initial conditions before solver execution.
physics:
  model_class:
  - physics feature assignment
  - boundary-condition contract
  governing_parameters:
    physics_interfaces: configurable
    material_properties: configurable
    boundary_conditions: configurable
    initial_conditions: configurable
inputs:
  assignment_contract:
  - physics_feature_tags
  - material_assignments
  - boundary_assignments
  - initial_conditions
  - unit_policy
outputs:
  required_artifacts:
  - physics_assignment_manifest.json
  - boundary_assignment_manifest.json
  - validation.json
  - validation_report.md
  scalar_metrics:
  - physics_feature_count
  - material_assignment_count
  - missing_boundary_assignment_count
  - missing_unit_count
benchmark:
  source_name: C02/C03 generated model with explicit physics assignment
  source_type: generated contract source
  benchmark_role: Static gate before study execution.
  status_rationale: Local MATLAB LiveLink generated-rectangle runtime smoke passed for material, physics, boundary, and unit assignment; the domain_activation official replay smoke now adds supporting physics/boundary handoff evidence. Solver convergence as a benchmark, full tutorial parity, double-v, and benchmark validation are not claimed.
validation_criteria:
- Every solver-facing boundary role must have a declared assignment or an explicit out-of-scope reason.
- Validation must reject missing units, missing material assignments, and unknown physics tags.
- Runtime smoke must prove generated rectangle assignment artifacts while keeping solver execution in C05.
- Targeted negative validation must reject incomplete boundary assignment and missing unit metrics.
- Assignment completeness must be separated from solver convergence.
integration_targets:
  workflow_stage: multiphysics.comsol.physics_boundary_assignment_contract
  input_schema: schemas/comsol_C04_physics_boundary_assignment_contract.schema.json
  default_config: configs/comsol/physics_boundary_assignment_contract/local_livelink_heat_rectangle.yaml
  runtime_target: _results/comsol/physics_boundary_assignment_contract/
  package_entrypoint: science_capability_registry.comsol.physics_boundary_assignment_contract:run
  depends_on: C03_geometry_mesh_import_contract
intern_deliverables:
- Define material, physics, BC, and IC manifest schemas.
- Add negative tests for missing assignments and unknown units.
- Keep solver execution in C05, not in this contract.
- Map official replay assignment checks from `livelink_domain_activation` or `livelink_pseudoperiodicity` after C03 candidate open succeeds.
card_status: review
benchmark_status: package_skeleton_created
