asset_id: C03_geometry_mesh_import_contract
software: COMSOL
source_url: https://www.comsol.com/livelink-for-matlab
domain: multiphysics
capability_name: geometry mesh import contract
problem_type:
  category: geometry, mesh, import, and selection mapping
  description: Build or import geometry and mesh through MATLAB-controlled COMSOL workflows while preserving named selections and boundary-role semantics.
physics:
  model_class:
  - geometry preparation
  - mesh/import source readiness
  - selection mapping
  governing_parameters:
    geometry_parameters: configurable
    mesh_controls: configurable
    selection_names: configurable
inputs:
  geometry_mesh_contract:
  - geometry_source
  - entity_dimensions
  - mesh_size_policy
  - named_selections
  - boundary_roles
outputs:
  required_artifacts:
  - geometry_manifest.json
  - mesh_manifest.json
  - selection_map.json
  - validation.json
  - validation_report.md
  scalar_metrics:
  - geometry_entity_count
  - mesh_entity_count
  - named_selection_count
  - missing_boundary_role_count
benchmark:
  source_name: Generated geometry first, official Application Library model later
  source_type: generated or official example source
  benchmark_role: Candidate benchmark for robust geometry/mesh/source-readiness.
  status_rationale: Local MATLAB LiveLink generated-rectangle runtime smoke passed for geometry, mesh, and selection artifacts; the domain_activation official replay smoke now adds supporting selection-map evidence. CAD import robustness, full tutorial parity, double-v, and benchmark validation are not claimed.
validation_criteria:
- Geometry, mesh, and named selection roles must be visible in config/schema.
- Validation must reject missing required selections and boundary-role mismatches.
- Runtime smoke must prove generated rectangle geometry and mesh artifacts without claiming mesh-quality or benchmark validation.
- Targeted negative validation must reject missing selection-role metrics before any official replay promotion.
- CAD/import success must not be treated as physics validation.
integration_targets:
  workflow_stage: multiphysics.comsol.geometry_mesh_import_contract
  input_schema: schemas/comsol_C03_geometry_mesh_import_contract.schema.json
  default_config: configs/comsol/geometry_mesh_import_contract/local_livelink_heat_rectangle.yaml
  runtime_target: _results/comsol/geometry_mesh_import_contract/
  package_entrypoint: science_capability_registry.comsol.geometry_mesh_import_contract:run
  depends_on: C02_model_construction_api_contract
intern_deliverables:
- Start with generated geometry before large CAD import.
- Emit geometry, mesh, and selection manifests.
- Add negative validation for renamed, missing, or dimension-mismatched selections.
- Implement official replay first against the env-rooted `livelink_domain_activation` candidate without committing `.mph` binaries.
card_status: review
benchmark_status: package_skeleton_created
