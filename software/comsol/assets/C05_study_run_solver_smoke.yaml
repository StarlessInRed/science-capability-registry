asset_id: C05_study_run_solver_smoke
software: COMSOL
source_url: https://www.comsol.com/livelink-for-matlab
domain: multiphysics
capability_name: study run solver smoke
problem_type:
  category: study execution and solver-status smoke
  description: Run a complete MATLAB-driven COMSOL study and validate solver completion, convergence/status, and result dataset creation.
physics:
  model_class:
  - stationary or time-dependent study smoke
  - solver execution status
  governing_parameters:
    study_type: configurable
    solver_controls: configurable
    tolerances: configurable
inputs:
  study_contract:
  - source_model
  - study_tag
  - solver_tag
  - expected_dataset
  - max_runtime_seconds
outputs:
  required_artifacts:
  - solver_manifest.json
  - metrics.json
  - validation.json
  - validation_report.md
  scalar_metrics:
  - solver_return_status
  - result_dataset_count
  - elapsed_seconds
  - convergence_status
benchmark:
  source_name: Complete C04 model or small official Application Library model
  source_type: generated or official example source
  benchmark_role: First solver smoke gate after model construction and assignment contracts.
  status_rationale: Local MATLAB LiveLink generated-rectangle stationary solver smoke passed and emitted solver/dataset artifacts; domain_activation and pseudoperiodicity official replay smokes now add supporting study/dataset evidence. Analytical field validation, full tutorial parity, double-v, and benchmark validation are not claimed.
validation_criteria:
- Study must reach configured completion status and produce expected result datasets.
- Solver failure must be separated from model-construction and postprocess failure.
- Runtime smoke must prove generated rectangle study completion and dataset presence without promoting to benchmark validation.
- Targeted negative validation must reject solver failure, missing dataset, and nonzero MATLAB return code.
- Solver success must not be treated as analytical benchmark validation.
integration_targets:
  workflow_stage: multiphysics.comsol.study_run_solver_smoke
  input_schema: schemas/comsol_C05_study_run_solver_smoke.schema.json
  default_config: configs/comsol/study_run_solver_smoke/local_livelink_heat_rectangle.yaml
  runtime_target: _results/comsol/study_run_solver_smoke/
  package_entrypoint: science_capability_registry.comsol.study_run_solver_smoke:run
  depends_on: C04_physics_boundary_assignment_contract
intern_deliverables:
- Implement one minimal solver smoke after C01-C04 pass.
- Emit solver status and dataset manifest.
- Add timeout and convergence-status validation.
- Add official replay smoke for the selected Application Library candidate before any benchmark promotion review.
card_status: review
benchmark_status: package_skeleton_created
