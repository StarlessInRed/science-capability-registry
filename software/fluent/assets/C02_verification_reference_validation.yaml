asset_id: C02_verification_reference_validation
software: Fluent
source_url: https://www.ansys.com/products/fluids/ansys-fluent
domain: CFD
capability_name: verification reference validation
problem_type:
  category: analytical, experimental, or documented verification target
  description: Bind Fluent runtime outputs to a defensible reference from the Fluid Dynamics Verification Manual before claiming benchmark validation.
physics:
  model_class:
  - verification benchmark
  - analytical or documented reference comparison
  governing_parameters:
    reference_case: selectable
    error_norm: configurable
    mesh_or_time_refinement: configurable
inputs:
  source_candidates:
  - ansys_fluid_dynamics_verification_manual.pdf
  selected_reference_case: VMFL005
  run_schema_targets:
  - reference_source
  - geometry_homology_policy
  - error_thresholds
  - output_sampling_policy
outputs:
  required_artifacts:
  - reference_manifest.json
  - pipe_axisymmetric_mesh.msh
  - mesh_manifest.json
  - journal.jou
  - metrics.json
  - validation.json
  - validation_report.md
  scalar_metrics:
  - computed_formula_pressure_drop_pa
  - target_pressure_drop_pa
  - manual_fluent_pressure_drop_pa
  - manual_relative_error
  - mesh_cell_count
  - fluent_warning_count
  - pressure_drop_runtime_status
benchmark:
  source_name: Ansys Fluid Dynamics Verification Manual
  source_type: verification manual
  benchmark_role: VMFL005 Poiseuille pipe pressure-drop reference for future self-generated Fluent benchmark promotion.
  status_rationale: Verification source and formula target are mapped; a self-generated VMFL005 mesh-readability smoke passed locally, but pressure-drop solve and mesh-trend closure are not yet benchmark validated.
validation_criteria:
- Reference geometry, boundary conditions, units, and sampling must be declared before numeric thresholds are applied.
- Tutorial replay must not be promoted to benchmark without reference homology.
- Validation must record error norms and unverified risks.
integration_targets:
  workflow_stage: cfd.fluent.verification_reference_validation
  input_schema: schemas/fluent_C02_verification_reference_validation.schema.json
  package_entrypoint: science_capability_registry.fluent.verification_reference_validation:run
  runtime_target: _results/fluent/verification_reference_validation/
intern_deliverables:
- Generate a self-contained VMFL005 axisymmetric pipe case from config.
- Extract pressure drop from Fluent and compare it with the Hagen-Poiseuille target.
- Add three mesh levels before benchmark validation.
card_status: review
benchmark_status: package_skeleton_created
