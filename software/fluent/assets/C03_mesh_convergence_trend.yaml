asset_id: C03_mesh_convergence_trend
software: Fluent
source_url: https://www.ansys.com/products/fluids/ansys-fluent
domain: CFD
capability_name: mesh convergence trend
problem_type:
  category: mesh refinement, adaptation, and numerical trend validation
  description: Prove that Fluent outputs respond consistently to mesh or adaptation changes instead of relying on one tutorial mesh.
physics:
  model_class:
  - mesh refinement trend
  - adaptation workflow
  governing_parameters:
    refinement_levels: configurable
    adaptation_strategy: configurable
    monitored_quantities: configurable
inputs:
  source_candidates:
  - Fluent_Tutorial_Package/fluent_adaptation.zip
  - C01 self-generated perturbation cases
outputs:
  required_artifacts:
  - refinement_matrix.csv
  - metrics.json
  - validation.json
  - validation_report.md
  scalar_metrics:
  - cell_count
  - monitored_quantity_delta
  - residual_trend
benchmark:
  source_name: Fluent adaptation tutorial and self-generated mesh perturbations
  source_type: tutorial and generated regression source
  benchmark_role: Targeted-regression seed for mesh/adaptation robustness.
  status_rationale: Benchmark candidate retained; a self-generated three-level pressure-drop runtime smoke now exists, while official adaptation replay and analytical convergence are still separate promotion gates.
validation_criteria:
- At least three mesh/adaptation levels must be represented before targeted-regression promotion.
- Reports must explain expected physical or numerical trend.
- Solver failure, mesh-quality failure, and parser failure must be classified separately.
integration_targets:
  workflow_stage: cfd.fluent.mesh_convergence_trend
  runtime_target: _results/fluent/mesh_convergence_trend/
  package_entrypoint: science_capability_registry.fluent.mesh_convergence_trend.cli:main
  default_config: configs/fluent/mesh_convergence_trend/c02_pressure_drop_refinement_runtime_smoke.yaml
  input_schema: schemas/fluent_C03_mesh_convergence_trend.schema.json
intern_deliverables:
- Define refinement/adaptation config matrix.
- Parse monitored quantities across levels.
- Compare self-generated and tutorial replay trends.
card_status: review
benchmark_status: benchmark_candidate
