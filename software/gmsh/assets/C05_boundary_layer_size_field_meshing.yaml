asset_id: C05_boundary_layer_size_field_meshing
software: Gmsh
source_url: https://gmsh.info/doc/texinfo/gmsh.html
domain: meshing
capability_name: boundary-layer and size-field meshing
problem_type:
  category: boundary-layer and spatial mesh-size control
  description: Configure boundary-layer or distance/threshold size fields so near-wall, near-interface, or local feature regions receive solver-appropriate mesh resolution.
physics:
  model_class:
  - anisotropic or near-boundary mesh-size control
  - CFD/FEM preprocessing for wall-adjacent or feature-adjacent regions
  - size-field validation
  governing_parameters:
    boundary_layer_thickness: configurable
    growth_ratio: configurable
    first_layer_height: configurable
    distance_field_sources: configurable
    threshold_field_limits: configurable
  benchmark_template:
    source_name: Gmsh mesh size fields and boundary-layer field documentation
    role: Evidence for field-driven mesh-size control.
inputs:
  run_schema_targets:
  - base_geometry
  - wall_or_feature_groups
  - size_field_type
  - first_layer_height
  - growth_ratio
  - total_thickness
  - quality_thresholds
outputs:
  required_artifacts:
  - size_field_manifest.json
  - boundary_layer_summary.json
  - mesh_quality_summary.json
  - validation.json
  - validation_report.md
  scalar_metrics:
  - near_wall_element_count
  - min_near_wall_spacing
  - max_growth_ratio_observed
  - min_quality_proxy
benchmark:
  source_name: Gmsh size fields and boundary layer controls
  source_type: official documentation
  benchmark_role: Candidate benchmark for field-driven refinement and boundary-layer mesh generation.
  status_rationale: Package skeleton created. Boundary-layer and size-field meshing now has a schema/config/package dry-run contract that depends on C02 physical group semantics because the wall/feature groups define where the field applies.
validation_criteria:
- Capability card must validate against schemas/capability_card.schema.json.
- Run schema exposes field type, target groups, first-layer height, growth ratio, total thickness, far-field size, expected near-wall metrics, and quality thresholds.
- Validation must reject missing target groups, nonfinite field parameters, and low-quality near-wall cells.
- Boundary-layer metrics must be reported separately from global mesh quality.
- Current static-readiness gate must write size_field_manifest.json, boundary_layer_summary.json, mesh_quality_summary.json, manifest.json, metrics.json, validation.json, and validation_report.md with validation.passed=true.
- CFD y+ or solver-specific wall validation is out of scope unless connected to a downstream solver evidence report.
integration_targets:
  workflow_stage: meshing.gmsh.boundary_layer_size_field_meshing
  input_schema: schemas/gmsh_C05_boundary_layer_size_field_meshing.schema.json
  package_entrypoint: science_capability_registry.gmsh.boundary_layer_size_field_meshing:run
  runtime_target: _results/gmsh/boundary_layer_size_field_meshing/
intern_deliverables:
- Extend the current size-field config using explicit physical group targets with true Gmsh field generation.
- Implement boundary-layer or distance/threshold field runtime generation.
- Maintain near-wall spacing and growth-ratio diagnostics.
- Maintain negative tests for missing wall groups, impossible layer parameters, and low-quality near-wall metrics.
- Keep solver-specific y+ validation as a downstream capability, not a Gmsh-only claim.
card_status: review
benchmark_status: package_skeleton_created
