        final_temperature_error_k: 2.98818
  benchmark_role: Default benchmark for converting reaction-rate ranking into reduced-mechanism candidates and validating ignition-profile fidelity.
validation_criteria:
  - Full mechanism ignition run must reach configured end time and produce finite temperature, pressure, and ranking data.
  - Reaction ranking must include the full reaction set, have finite scores in descending order, and cover at least the largest configured reduced reaction count.
  - Each reduced mechanism YAML must be generated, reloadable by Cantera, and have exactly the configured reaction count.
  - Full and reduced temperature profiles must contain enough points, finite temperatures, and positive temperature rise.
  - The largest reduced mechanism must stay within configured ignition-delay and final-temperature error limits.
  - CSV profiles, ranking table, reduction summary, reduced YAML files, comparison plot, log, metrics, and validation report must be generated.
integration_targets:
  package_entrypoint: science_capability_registry.cantera.c06_mechanism_reduction:run
  input_schema: schemas/cantera_C06_mechanism_reduction.schema.json
  output_contract: reports/validation_report_template.md
  workflow_stage: combustion.cantera.mechanism_reduction
  integration_notes:
    - Treat this as a benchmark capability for ranking and candidate reduction, not as a proof of globally optimal skeletal chemistry.
    - Expose reaction counts, always-included species, run time, and validation tolerances through config.
    - Feed C05 reaction path analysis and C01/C02 ignition benchmarks later for deeper reduced-mechanism validation.
intern_deliverables:
  - Python package implementation with a stable callable entrypoint.
  - Input schema for official n-hexane reduction benchmark.
  - Full/reduced profile CSVs, reaction ranking CSV, reduced YAML files, comparison plot, log, metrics, and validation report.
  - Automatic validation script covering ranking, reduced mechanism generation, reloadability, profile integrity, and error metrics.
  - Short explanation of why reduced-mechanism error generally decreases with reaction count and where non-monotonic behavior can occur.
card_status: accepted
benchmark_status: benchmark_validated
