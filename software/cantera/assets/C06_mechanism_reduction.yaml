asset_id: C06_mechanism_reduction
software: Cantera
source_url: https://cantera.org/stable/examples/python/kinetics/mechanism_reduction.html
domain: combustion
capability_name: mechanism reduction
problem_type:
  category: kinetic mechanism reduction
  description: Rank reactions by maximum relative net rate of progress, build reduced mechanisms, and compare ignition temperature profiles against the detailed mechanism.
physics:
  reactor_model: IdealGasConstPressureMoleReactor
  chemistry_model: finite-rate n-hexane oxidation using example_data/n-hexane-NUIG-2015.yaml
  thermodynamic_constraint: adiabatic constant-pressure homogeneous reactor
  ranking_model: maximum relative net rate of progress over the full-mechanism ignition run
  reduction_model: keep top-ranked reactions and all species participating in those reactions, plus always-included inlet species
inputs:
  mechanism: example_data/n-hexane-NUIG-2015.yaml
  reactor_model: ideal_gas_constant_pressure_mole
  initial_temperature_k: 975.0
  pressure_pa: 506625.0
  equivalence_ratio: 0.8
  fuel: NC6H14:1.0
  oxidizer: O2:1.0, N2:3.76
  simulation:
    end_time_s: 0.04
    max_steps: 200000
    use_adaptive_preconditioner: true
  reduction:
    reaction_counts:
      - 100
      - 200
      - 300
      - 400
      - 600
      - 800
outputs:
  required_fields:
    - full_species_count
    - full_reaction_count
    - full_ignition_delay_ms
    - reaction_ranking
    - reduced_species_count
    - reduced_reaction_count
    - reduced_ignition_delay_ms
    - ignition_delay_relative_error
    - final_temperature_error_k
  required_artifacts:
    - baseline_profile.csv
    - reduced_<N>_profile.csv
    - reaction_ranking.csv
    - reduction_summary.csv
    - reduced_mechanisms/reduced_<N>_reaction.yaml
    - mechanism_reduction_temperature_profiles.png
    - mechanism_reduction_run.log
    - metrics.json
    - validation_report.md
benchmark:
  source_name: Cantera official Python example, Mechanism reduction
  reference_case:
    mechanism: example_data/n-hexane-NUIG-2015.yaml
    initial_temperature_k: 975.0
    pressure_pa: 506625.0
    equivalence_ratio: 0.8
    fuel: NC6H14:1.0
    oxidizer: O2:1.0, N2:3.76
    end_time_s: 0.04
    reaction_counts:
      - 100
      - 200
      - 300
      - 400
      - 600
      - 800
  reference_observations:
    cantera_version: 3.2.0
    config: configs/cantera/c06_mechanism_reduction/baseline.yaml
    validation: passed
    full_species_count: 1268
    full_reaction_count: 5336
    full_ignition_delay_ms: 14.6679
    full_final_temperature_k: 2508.04
    full_profile_points: 1280
