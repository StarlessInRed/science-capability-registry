asset_id: C08_compressible_shock_capturing_forward_step
software: OpenFOAM
source_url: https://www.openfoam.com/documentation/guides/latest/doc/guide-applications-solvers-compressible-rhoCentralFoam.html
domain: CFD
capability_name: compressible shock capturing forward step
problem_type:
  category: transient compressible inviscid or turbulent shock-capturing flow
  description: Use OpenFOAM.com v2112 rhoCentralFoam forwardStep tutorial evidence to validate compressible shock-capturing behavior through shock position, pressure and density jumps, CFL control, and conservation checks.
physics:
  openfoam_distribution: openfoam_com
  openfoam_version: v2112 local tutorial evidence
  solver: rhoCentralFoam
  solver_family: transient density-based compressible finite-volume solver
  model_class:
  - compressible Euler or Navier-Stokes shock capturing
  - high-speed flow over a forward step
  - transient CFL-controlled density, pressure, and velocity evolution
  governing_parameters:
    mach_number: configurable
    inlet_pressure_pa: configurable
    inlet_temperature_k: configurable
    thermophysical_model: configurable
    max_cfl: configurable
  benchmark_template:
    source_tree_path: tutorials/compressible/rhoCentralFoam/forwardStep
    local_path: /opt/OpenFOAM-v2112/tutorials/compressible/rhoCentralFoam/forwardStep
    solver_application: rhoCentralFoam
inputs:
  run_schema_targets:
  - runtime_profile
  - official_template_source_path
  - forward_step_geometry
  - inlet_mach_or_state
  - thermophysical_properties
  - time_controls
  - max_cfl
  - shock_position_targets
  - conservation_thresholds
  baseline_case:
    tutorial_path: $FOAM_TUTORIALS/compressible/rhoCentralFoam/forwardStep
    solver: rhoCentralFoam
  shock_reference:
    reference_policy: configured benchmark table or accepted baseline samples; analytical normal-shock relations may be used only as sanity bounds for local normal Mach estimates
    required_sample_sets:
    - streamwise_centerline_or_user_configured_line
    - vertical_lines_upstream_and_downstream_of_step
    - shock_front_candidate_cells_from_pressure_or_density_gradient
    extraction_method: locate pressure or density gradient maxima, then compute upstream/downstream state averages across configured windows
    required_tolerance_fields:
    - shock_position_absolute_tolerance
    - shock_position_relative_tolerance
    - pressure_jump_relative_tolerance
    - density_jump_relative_tolerance
    - max_cfl
    - conservation_error_threshold
  perturbation_matrix_targets:
  - baseline
  - cfl_reduced
  - mesh_refined
  - inlet_mach_changed
outputs:
  fields:
  - U
  - p
  - T
  - rho
  scalar_metrics:
  - max_cfl
  - final_residuals
  - shock_position
  - pressure_jump_ratio
  - density_jump_ratio
  - boundary_flux_mass_imbalance_proxy
  - boundary_flux_total_energy_imbalance_proxy
  - boundary_flux_mass_imbalance_face_field
  - boundary_flux_total_energy_imbalance_face_field
  required_artifacts:
  - rhoCentralFoam log
  - field extrema summary
  - shock line sample CSV
  - conservation summary
  - boundary flux summary CSV
  - face flux parity summary CSV
  - metrics.json
  - validation.json
  - validation_report.md
benchmark:
  source_name: OpenFOAM.com rhoCentralFoam forwardStep tutorial
  source_type: official tutorial and local source evidence
  tutorial_path: $FOAM_TUTORIALS/compressible/rhoCentralFoam/forwardStep
  benchmark_role: Benchmark candidate for compressible shock-capturing solver health, shock location, jump conditions, CFL control, and conservation.
  status_rationale: Official tutorial evidence is identified and this repository now contains a C08 run schema, baseline and reduced-CFL configs, package runner, dry-run manifest validation, static-readiness tests, and local WSL v2112 runtime evidence. The reduced-CFL runtime completes blockMesh, checkMesh, and rhoCentralFoam to final time, passes max-Courant control, leading-shock jump sanity, boundary-flux owner-cell proxy checks, face-field flux integration checks, and smoke-level accepted-baseline shock reference checks. The first-batch case-freeze accepts this local shock-capturing baseline as benchmark_validated for registry scope, while external or independently reviewed shock reference targets and native OpenFOAM flux parity remain next-phase promotion work if required.
  case_freeze:
    status: benchmark_validated_for_local_case_freeze
    evidence: reports/openfoam_C01_C08_case_freeze_closure_2026-07-01.md
    scope: Reduced-CFL local runtime with max-Courant control, shock jump sanity, local accepted-baseline shock samples, and face-field flux integration.
    do_not_claim: External shock benchmark validation, native rhoPhi/phi parity, or mesh/Mach independence.
  runtime_evidence:
  - report: reports/openfoam_C08_compressible_shock_capturing_forward_step_cfl_reduced_runtime_smoke_2026-07-01.md
    scope: reduced-CFL local runtime smoke with shock metrics and boundary-flux owner-cell proxy
    status: passed
    result_root: _results/openfoam/compressible_shock_capturing_forward_step/cfl_reduced/
  - report: reports/openfoam_C08_reference_shock_closure_2026-07-01.md
    scope: accepted-baseline shock reference closure for smoke-level validation
    status: passed
    result_root: _results/openfoam/compressible_shock_capturing_forward_step/cfl_reduced/
  - report: reports/openfoam_C08_face_field_flux_parity_2026-07-01.md
    scope: face-field flux integration parity artifact on reduced-CFL runtime
    status: passed
    result_root: _results/openfoam/compressible_shock_capturing_forward_step/cfl_reduced/
validation_criteria:
- Capability card must validate against schemas/capability_card.schema.json.
- Run schema must expose compressible state, thermophysical model, step geometry, time controls, CFL limit, and shock validation targets.
- Runtime validation must check rhoCentralFoam completion, max CFL, finite bounded thermodynamic fields, and absence of fatal errors; the current baseline runtime attempt completes but exceeds the configured max-CFL threshold.
- Postprocess must extract shock position and pressure/density jumps from field samples.
- Conservation validation must report boundary-flux mass and total-energy imbalance proxies plus face-field flux integration; neither should be presented as external shock validation or native `rhoPhi/phi` functionObject evidence.
- Smoke closure uses accepted baseline shock samples in `cfl_reduced.yaml`; promotion beyond local case-freeze requires external or independently reviewed shock position and jump references.
- Shock position extraction must use configured sample lines or gradient-based candidate cells and report the upstream/downstream averaging windows.
- Pressure and density jumps must be compared with configured reference values or clearly marked analytical sanity bounds; local accepted-baseline samples close only the smoke reference gate.
- CFL perturbation must show stable shock metrics under a reduced max-CFL setting before promotion.
- Mesh-refinement perturbation must report shock-position shift and numerical-diffusion trend.
- Inlet-Mach perturbation must produce directionally consistent pressure and density jump changes or be rejected as physically unexplained.
integration_targets:
  package_entrypoint: science_capability_registry.openfoam.compressible_shock_capturing_forward_step:run
  input_schema: schemas/openfoam_C08_compressible_shock_capturing_forward_step.schema.json
  workflow_stage: cfd.openfoam.compressible_shock_capturing_forward_step
  runtime_target: _results/openfoam/compressible_shock_capturing_forward_step/
  runtime_profile: configs/openfoam/runtime_profiles/openfoam_com_v2112.yaml
intern_deliverables:
- Replace the current local accepted-baseline smoke reference with external or independently reviewed shock position, pressure jump, and density jump targets before external/reference promotion.
- Extend C08 shock metrics with a second downstream/reflected-compression metric if that structure is needed beyond the leading-shock smoke gate.
- Validate the current face-field flux integration against native OpenFOAM flux output if native flux evidence is required for benchmark promotion.
- Keep local case-freeze and external-reference promotion evidence separate so local accepted-baseline samples cannot be mistaken for external shock validation.
card_status: review
benchmark_status: benchmark_validated
