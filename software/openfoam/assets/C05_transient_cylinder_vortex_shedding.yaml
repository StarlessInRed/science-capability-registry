asset_id: C05_transient_cylinder_vortex_shedding
software: OpenFOAM
source_url: https://www.openfoam.com/documentation/tutorial-guide/2-incompressible-flow/2.2-flow-around-a-cylinder
domain: CFD
capability_name: transient cylinder vortex shedding
problem_type:
  category: transient incompressible laminar external flow
  description: Use OpenFOAM.com v2112 pimpleFoam and the official cylinder2D tutorial family to simulate unsteady flow around a cylinder, extract lift/drag histories, and estimate vortex-shedding frequency or Strouhal number.
physics:
  openfoam_distribution: openfoam_com
  openfoam_version: v2112 local tutorial evidence
  solver: pimpleFoam
  solver_family: transient incompressible PIMPLE finite-volume solver
  model_class:
  - incompressible laminar Navier-Stokes flow
  - 2D cylinder wake and vortex shedding
  - transient pressure-velocity coupling
  governing_parameters:
    cylinder_diameter_m: configurable
    inlet_velocity_m_s: configurable
    kinematic_viscosity_m2_s: configurable
    reynolds_number_D: configurable
    max_courant: configurable
  benchmark_template:
    source_tree_path: tutorials/incompressible/pimpleFoam/laminar/cylinder2D
    local_path: /opt/OpenFOAM-v2112/tutorials/incompressible/pimpleFoam/laminar/cylinder2D
    solver_application: pimpleFoam
    detected_template_geometry:
      cylinder_diameter_m: 0.12
      two_dimensional_thickness_m: 0.015
      domain_bounds_m:
        x_min: -0.6075
        x_max: 1.120002
        y_min: -0.6
        y_max: 0.6
inputs:
  run_schema_targets:
  - backend
  - runtime_profile
  - official_template_source_path
  - cylinder_geometry
  - inlet_velocity
  - kinematic_viscosity
  - Reynolds_number
  - mesh_workflow
  - front_back_empty_patch_contract
  - transient_time_controls
  - PIMPLE_controls
  - forceCoeffs_or_force_extraction
  - shedding_frequency_or_Strouhal_validation
  baseline_case:
    tutorial_path: $FOAM_TUTORIALS/incompressible/pimpleFoam/laminar/cylinder2D
    solver: pimpleFoam
    mesh_workflow:
    - blockMesh coarse mesh
    - snappyHexMesh
    - blockMesh main mesh
    - mirrorMesh
    - decomposePar
    - pimpleFoam
outputs:
  fields:
  - U
  - p
  scalar_metrics:
  - Courant_number_history
  - final_residuals
  - force_coefficients
  - lift_coefficient_time_series
  - drag_coefficient_time_series
  - shedding_frequency_Hz
  - Strouhal_number
  - mesh_quality_summary
  required_artifacts:
  - blockMesh log
  - snappyHexMesh log
  - mirrorMesh log
  - pimpleFoam solver log
  - force coefficient time series
  - metrics.json
  - validation.json
  - validation_report.md
benchmark:
  source_name: OpenFOAM.com pimpleFoam laminar cylinder2D tutorial
  source_type: official tutorial and local runtime evidence source
  tutorial_path: $FOAM_TUTORIALS/incompressible/pimpleFoam/laminar/cylinder2D
  benchmark_role: Benchmark candidate for transient cylinder wake, force-coefficient extraction, and vortex-shedding trend validation.
  status_rationale: The repository records a run schema, configs, package runner, dry-run manifest path, runtime parser, config-visible force-coefficient postprocess contract, and local WSL runtime evidence. Solver-only and short Python force-proxy smokes pass, and the official template geometry has been corrected to the generated mesh scale. A corrected Re=100 long-horizon Python force-proxy run completes pimpleFoam and writes a 320-row force CSV, but fails the configured Strouhal target range with St=0.13846 against [0.16, 0.24]. Native forceCoeffs still fails at functionObject startup with local v2112 sha1 IO behavior, so benchmark validation remains failed until native/DMD/reference parity and sensitivity evidence are produced.
  local_source_evidence:
    runtime_profile: openfoam_com_v2112
    wsl_distro: Ubuntu-24.04
    tutorial_root: /opt/OpenFOAM-v2112/tutorials/incompressible/pimpleFoam/laminar/cylinder2D
    solver: pimpleFoam
  runtime_evidence:
  - report: reports/openfoam_C05_transient_cylinder_vortex_shedding_runtime_smoke_2026-06-30.md
    scope: solver-only pimpleFoam smoke
    status: passed
    result_root: _results/openfoam/transient_cylinder_vortex_shedding/runtime_solver_smoke_wsl_v2112_20260630_002/
  - report: reports/openfoam_C05_transient_cylinder_vortex_shedding_runtime_smoke_2026-06-30.md
    scope: forceCoeffs-enabled pimpleFoam smoke
    status: failed
    result_root: _results/openfoam/transient_cylinder_vortex_shedding/runtime_forcecoeffs_smoke_wsl_v2112_20260630_002/
  - report: reports/openfoam_C05_transient_cylinder_vortex_shedding_runtime_smoke_2026-06-30.md
    scope: Python patch-surface force proxy pimpleFoam smoke
    status: passed
    result_root: _results/openfoam/transient_cylinder_vortex_shedding/runtime_python_force_proxy_wsl_v2112_20260630_002/
  - report: reports/openfoam_C05_transient_cylinder_vortex_shedding_strouhal_long_horizon_attempt_2026-06-30.md
    scope: corrected-geometry Re=100 Python patch-surface force proxy Strouhal attempt
    status: failed
    result_root: _results/openfoam/transient_cylinder_vortex_shedding/runtime_python_force_proxy_strouhal_wsl_v2112_20260630_003/
validation_criteria:
- Capability card must validate against schemas/capability_card.schema.json and must remain validation_failed until Strouhal validation evidence passes.
- Run schema must expose geometry, material, Reynolds number, mesh workflow, time controls, PIMPLE controls, force extraction, and validation thresholds as config-visible fields.
- Dry-run manifest must prove the generated case contains U and p fields, transportProperties, turbulenceProperties, controlDict, fvSchemes, fvSolution, and mesh dictionaries.
- Runtime smoke must complete mesh generation and pimpleFoam without FOAM FATAL errors or true floating-point exceptions.
- Solver log must report finite residuals, bounded Courant numbers, and final time reaching the configured horizon.
- Force coefficient extraction source must be config-visible and must produce lift and drag time series before shedding-frequency validation is attempted.
- Official cylinder2D template geometry must be read from or matched to generated mesh scale before Reynolds number, force coefficient, or Strouhal validation is interpreted.
- Strouhal target remains failed until local force time series, native/DMD/reference parity, and at least one mesh/time-step sensitivity case pass.
integration_targets:
  package_entrypoint: science_capability_registry.openfoam.transient_cylinder_vortex_shedding:run
  input_schema: schemas/openfoam_C05_transient_cylinder_vortex_shedding.schema.json
  workflow_stage: cfd.openfoam.transient_cylinder_vortex_shedding
  runtime_target: _results/openfoam/transient_cylinder_vortex_shedding/
  runtime_profile: configs/openfoam/runtime_profiles/openfoam_com_v2112.yaml
intern_deliverables:
- Implement a config-first dry-run generator for the official cylinder2D tutorial.
- Add runtime execution only after the dry-run manifest and schema are accepted.
- Extract lift/drag coefficients and compute a transparent Strouhal estimate from the time series.
- Add validation for Courant bounds, residual finiteness, force artifact completeness, and provisional shedding-frequency range.
- Resolve the current validation_failed status by proving native/DMD/reference Strouhal parity and at least one mesh/time-step sensitivity case.
card_status: review
benchmark_status: validation_failed
