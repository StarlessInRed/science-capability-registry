asset_id: C07_conjugate_heat_transfer_cooling
software: OpenFOAM
source_url: https://www.openfoam.com/documentation/user-guide/a-reference/a.1-standard-solvers
domain: multiphysics
capability_name: conjugate heat transfer cooling
problem_type:
  category: steady multi-region solid-fluid conjugate heat transfer
  description: Use OpenFOAM.com chtMultiRegionSimpleFoam and the official multiRegionHeaterRadiation tutorial to model buoyant air regions exchanging heat with solid regions through conjugate heat-transfer and radiation view-factor preprocessing.
physics:
  openfoam_distribution: openfoam_com
  openfoam_version: v2112 and v2412 local solver and tutorial evidence
  solver: chtMultiRegionSimpleFoam
  solver_family: steady buoyant multi-region conjugate heat-transfer finite-volume solver
  model_class:
  - buoyant turbulent fluid flow in one or more fluid regions
  - solid heat conduction in one or more solid regions
  - coupled temperature and heat-flux continuity at fluid-solid interfaces
  - SIMPLE-style steady iteration across region-specific equations
  governing_parameters:
    fluid_regions:
    - bottomAir
    - topAir
    solid_regions:
    - heater
    - leftSolid
    - rightSolid
    baseline_end_time_iterations: 2
    baseline_parallel_subdomains: 4
  benchmark_template:
    source_tree_path: tutorials/heatTransfer/chtMultiRegionSimpleFoam/multiRegionHeaterRadiation
    local_path: /opt/OpenFOAM-v2112/tutorials/heatTransfer/chtMultiRegionSimpleFoam/multiRegionHeaterRadiation
    region_properties:
      fluid:
      - bottomAir
      - topAir
      solid:
      - heater
      - leftSolid
      - rightSolid
  local_runtime_profile: openfoam_com_v2112_cht on WSL Ubuntu-24.04
inputs:
  run_schema_targets:
  - backend
  - runtime_profile
  - official_template_source_path
  - region_properties
  - fluid_thermophysical_properties
  - solid_thermophysical_properties
  - inlet_or_fan_flow_condition
  - fixed_temperature_or_heat_source
  - ambient_temperature
  - turbulence_model
  - mesh_workflow
  - radiation_view_factor_preprocessing
  - steady_iteration_controls
  - validation_thresholds
  baseline_case:
    tutorial_path: $FOAM_TUTORIALS/heatTransfer/chtMultiRegionSimpleFoam/multiRegionHeaterRadiation
    solver: chtMultiRegionSimpleFoam
    mesh_workflow:
    - ./Allrun.pre
    - checkMesh -allRegions -constant
    - faceAgglomerate
    - viewFactorsGen
    execution_mode: serial smoke
outputs:
  fields:
  - T
  - U
  - p
  - p_rgh
  - k
  - epsilon
  - qr
  - G
  - IDefault
  scalar_metrics:
  - final_region_residuals
  - region_continuity_errors
  - max_temperature_by_region
  - min_temperature_by_region
  - heater_peak_temperature
  - air_region_temperature_response
  - interface_temperature_jump_proxy
  - interface_heat_flux_balance_proxy
  - interface_heat_flux_field_mismatch
  - mesh_quality_summary
  - parallel_reconstruction_status
  required_artifacts:
  - Allrun.pre log
  - checkMesh log
  - faceAgglomerate logs
  - viewFactorsGen logs
  - chtMultiRegionSimpleFoam solver log
  - metrics.json
  - validation.json
  - validation_report.md
  - region_temperature_summary.csv
  - interface_balance_summary.csv
  - patch_heat_flux_proxy_summary.csv
  - interface_heat_flux_field_summary.csv
  - native wallHeatFlux fields when the selected profile supports solver post-processing
benchmark:
  source_name: OpenFOAM.com chtMultiRegionSimpleFoam multiRegionHeaterRadiation tutorial
  source_type: official tutorial and local solver source
  tutorial_path: $FOAM_TUTORIALS/heatTransfer/chtMultiRegionSimpleFoam/multiRegionHeaterRadiation
  benchmark_role: Packaged smoke baseline candidate for reusable multi-region CHT capability with explicit solid/fluid regions and radiation view-factor preprocessing.
  status_rationale: Local WSL OpenFOAM.com v2112 has chtMultiRegionSimpleFoam, chtMultiRegionFoam, the failing cpuCabinet tutorial, and the passing multiRegionHeaterRadiation tutorial. cpuCabinet remains diagnostic evidence because low-rank np=2 runs under both realizableKE and kEpsilon reproduce Time=2 floating-point exceptions. multiRegionHeaterRadiation now has a first-class run schema/config family, dry-run manifest, runtime command path, log parser, radiation artifact checks, metrics.json, validation.json, region temperature CSV, interface proxy CSV, patch heat-flux proxy CSV, field-derived interface heat-rate integration CSV, a packaged smoke baseline, and three perturbation runtime cases for heater temperature, airflow/boundary velocity, and mesh refinement. A v2112 native wallHeatFlux diagnostic failed on the local sha1 IO blocker, but a v2412 profile passes the official viewFactorsGen-only radiation path, solver smoke, solver post-processing wallHeatFlux commands for all five regions, and native wallHeatFlux field artifact checks. The first-batch case-freeze treats MHR integration plus v2412 native wallHeatFlux field generation as the validated local CHT baseline, while steady convergence, two-sided native heat-rate parity, and independent reference validation remain next-phase promotion work.
  case_freeze:
    status: benchmark_validated_for_local_case_freeze
    evidence: reports/openfoam_C01_C08_case_freeze_closure_2026-07-01.md
    scope: Packaged multiRegionHeaterRadiation baseline and perturbation matrix plus v2412 native wallHeatFlux field-generation smoke.
    do_not_claim: cpuCabinet validation, steady CHT convergence, native heat-rate parity, or independent heat-flux reference closure.
  local_runtime_evidence:
    runtime_profile: openfoam_com_v2112_cht
    wsl_distro: Ubuntu-24.04
    solver_binary: /opt/OpenFOAM-v2112/platforms/linux64GccDPInt32Opt/bin/chtMultiRegionSimpleFoam
    tutorial_root: /opt/OpenFOAM-v2112/tutorials/heatTransfer/chtMultiRegionSimpleFoam/multiRegionHeaterRadiation
    source_file: /opt/OpenFOAM-v2112/applications/solvers/heatTransfer/chtMultiRegionFoam/chtMultiRegionSimpleFoam/chtMultiRegionSimpleFoam.C
    v2412_runtime_profile: openfoam_com_v2412_cht
    v2412_tutorial_root: /usr/lib/openfoam/openfoam2412/tutorials/heatTransfer/chtMultiRegionSimpleFoam/multiRegionHeaterRadiation
  runtime_evidence:
  - report: reports/openfoam_C07_conjugate_heat_transfer_cooling_low_rank_diagnostics_2026-06-30.md
    scope: official cpuCabinet np=2 realizableKE diagnostic
    status: failed
    result_root: _results/openfoam/conjugate_heat_transfer_cooling/cpuCabinet_np2_realizableKE_diag_20260630_004/
  - report: reports/openfoam_C07_conjugate_heat_transfer_cooling_closure_and_alternate_tutorial_diagnostics_2026-06-30.md
    scope: official cpuCabinet np=2 kEpsilon diagnostic
    status: failed
    result_root: _results/openfoam/conjugate_heat_transfer_cooling/cpuCabinet_np2_kEpsilon_diag_20260630_001/
  - report: reports/openfoam_C07_conjugate_heat_transfer_cooling_closure_and_alternate_tutorial_diagnostics_2026-06-30.md
    scope: multiRegionHeaterRadiation short CHT runtime smoke
    status: passed
    result_root: _results/openfoam/conjugate_heat_transfer_cooling/multiRegionHeaterRadiation_short_wsl_v2112_20260630_001/
  - report: reports/openfoam_C07_conjugate_heat_transfer_cooling_multiRegionHeaterRadiation_baseline_smoke_2026-06-30.md
    scope: packaged multiRegionHeaterRadiation CHT runtime smoke
    status: passed
    result_root: _results/openfoam/conjugate_heat_transfer_cooling/baseline_multi_region_heater_radiation_wsl_v2112_20260630_002/
  - report: reports/openfoam_C07_conjugate_heat_transfer_cooling_multiRegionHeaterRadiation_integration_matrix_2026-06-30.md
    scope: packaged multiRegionHeaterRadiation baseline plus heater-temperature, airflow, and mesh-refinement perturbation matrix
    status: passed
    result_roots:
    - _results/openfoam/conjugate_heat_transfer_cooling/baseline_multi_region_heater_radiation_wsl_v2112_20260630_003/
    - _results/openfoam/conjugate_heat_transfer_cooling/perturb_heater_temperature_high_wsl_v2112_20260630_001/
    - _results/openfoam/conjugate_heat_transfer_cooling/perturb_airflow_high_wsl_v2112_20260630_001/
    - _results/openfoam/conjugate_heat_transfer_cooling/perturb_mesh_refinement_wsl_v2112_20260630_001/
  - report: reports/openfoam_C07_native_wall_heat_flux_diagnostic_2026-07-01.md
