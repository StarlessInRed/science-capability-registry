    status: failed
    result_root: _results/openfoam/conjugate_heat_transfer_cooling/baseline_multi_region_heater_radiation_wsl_v2112/
  - report: reports/openfoam_C07_v2412_native_wallHeatFlux_smoke_2026-07-01.md
    scope: OpenFOAM.com v2412 packaged multiRegionHeaterRadiation smoke with solver-postProcess wallHeatFlux fields
    status: passed
    result_root: _results/openfoam/conjugate_heat_transfer_cooling/baseline_multi_region_heater_radiation_wsl_v2412/
  alternate_tutorials:
  - tutorials/heatTransfer/chtMultiRegionSimpleFoam/multiRegionHeaterRadiation
  - tutorials/heatTransfer/chtMultiRegionSimpleFoam/externalCoupledHeater
  - tutorials/heatTransfer/chtMultiRegionSimpleFoam/heatExchanger
  alternate_tutorial_notes:
  - multiRegionHeaterRadiation has explicit solid/fluid regions, radiation view-factor setup, and passed a local short-horizon v2112 smoke to Time=2.
  - externalCoupledHeater has explicit solid/fluid regions but includes externalCoupled interface behavior.
  - heatExchanger is useful heat-transfer evidence but its v2112 regionProperties declares no solid region.
validation_criteria:
- Capability card must validate against schemas/capability_card.schema.json and must not use the retired top-level status field.
- Runtime profile must declare OpenFOAM.com v2112, WSL backend, legacy CHT multi-region layout, parallel execution, chtMultiRegionSimpleFoam, and required mesh/preprocess executables.
- Run schema must expose regionProperties, thermophysical properties, heat source or fixed-temperature driver, ambient condition, mesh workflow, radiation preprocessing, solver controls, and validation thresholds as config-visible fields.
- Dry-run manifest must prove the generated case contains constant/regionProperties, per-region 0/ fields, per-region constant properties, system dictionaries, and a deterministic command sequence.
- Mesh/radiation pipeline must complete the configured `Allrun.pre`, checkMesh, and version-appropriate radiation preprocessing before solver execution; v2112 uses faceAgglomerate plus viewFactorsGen while v2412 follows the official viewFactorsGen-only tutorial path.
- Solver baseline must reach the configured end time or iteration count with finite fields, acceptable residuals, and no missing region solves.
- Temperature fields must remain finite and physically bounded, and heater thermal-driver perturbations must increase peak solid/fluid response in the expected direction.
- Interface validation must report temperature continuity, patch heat-flux proxies, and field-derived two-sided patch-gradient heat-rate mismatch across coupled patches until a stronger native flux extraction is implemented.
- Integration evidence must keep baseline plus perturbations covering thermal driver, airflow or inlet condition, and mesh/decomposition sensitivity; promotion beyond local case-freeze still requires steady convergence plus native or independently referenced heat-flux validation.
- Current runtime debug evidence classifies the cpuCabinet blocker as a reproducible local v2112/tutorial solver path failure after sha1 mitigation and closure comparison, not a validated CHT baseline.
- Current packaged MHR integration matrix closes the executable-baseline, perturbation, proxy-artifact, and field-derived heat-rate diagnostic gaps for case-freeze, but is not a steady-state, native heat-flux-conservation, or external-reference validation.
- Current v2112 native wallHeatFlux diagnostic fails for all regions with the local OpenFOAM.com v2112 sha1 IO blocker; current v2412 solver-postProcess wallHeatFlux smoke succeeds and writes fields for all regions, but next-phase promotion still requires two-sided native/reference heat-rate parity and longer convergence evidence.
integration_targets:
  package_entrypoint: science_capability_registry.openfoam.conjugate_heat_transfer_cooling:run
  input_schema: schemas/openfoam_C07_conjugate_heat_transfer_cooling.schema.json
  workflow_stage: cfd.openfoam.conjugate_heat_transfer_cooling
  runtime_target: _results/openfoam/conjugate_heat_transfer_cooling/
  runtime_profile: configs/openfoam/runtime_profiles/openfoam_com_v2112_cht.yaml
intern_deliverables:
- Extend the current C07 integration matrix toward longer steady convergence evidence without hiding physics choices in CLI flags.
- Keep cpuCabinet as failed diagnostic evidence unless a separate stable runtime path is proven.
- Extend the v2412 native wallHeatFlux smoke into parsed two-sided heat-rate parity or independent reference comparison before external/reference promotion.
- Add double-v or reference-value comparison for temperature and heat-rate trends as next-phase work.
card_status: review
benchmark_status: benchmark_validated
