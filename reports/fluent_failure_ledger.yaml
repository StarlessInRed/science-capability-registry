ledger_id: science_capability_registry.fluent_failure_ledger
schema_version: 0.1.0
schema_path: schemas/fluent_failure_ledger.schema.json
index_role: failure_classification
scope: Fluent C01-C08
created_on: '2026-07-02'
source_policy:
  canonical_sources:
  - schemas/fluent_failure_ledger.schema.json
  - reports/evidence_index.yaml
  - reports/fluent_*.md
  - software/fluent/examples_index.md
  - software/fluent/assets/*.yaml
  runtime_policy: Runtime outputs under _results are supporting evidence only and are not canonical assets.
  conversation_policy: Conversation memory is not canonical unless it has been distilled into repository reports, configs, tests, or assets.
  status_policy: Parser/static-readiness and runtime-smoke claims must keep their no-claim boundary explicit; tutorial, Workbench, mesh-only, and reference sources are not interchangeable.
evidence_levels:
  repo_stable_report: Submitted report plus evidence_index entry.
  runtime_result: _results manifest, metrics, validation, or logs referenced by stable evidence.
  test_code_guard: Parser, schema, validation, config, or pytest guard that prevents silent regression.
  conversation_memory: Non-canonical lead; not used by this ledger.
work_queue_policy:
  priority_scale:
    P0: Blocks current Fluent C01-C08 source/runtime closure.
    P1: Required before first benchmark-oriented Fluent runtime promotion.
    P2: Required for replay, physics validation, external reference, or Workbench execution after source-readiness.
    P3: Historical, mitigated, or observation-only item retained for traceability.
  status_values:
  - active
  - blocked
  - gap
  - mitigation_only
  - resolved
  ordering_rule: Work queue is ordered by priority first, then by ability to separate runtime-profile problems from capability problems.
  closure_rule: A queue item closes only when referenced ledger entries gain stable repo evidence plus config/schema/test guards for the new claim boundary.
