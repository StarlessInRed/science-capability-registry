ledger_id: science_capability_registry.openfoam_failure_ledger
schema_version: 0.2.0
schema_path: schemas/openfoam_failure_ledger.schema.json
index_role: failure_classification
scope: OpenFOAM C01-C08
created_on: '2026-07-01'
source_policy:
  canonical_sources:
  - schemas/openfoam_failure_ledger.schema.json
  - reports/evidence_index.yaml
  - reports/openfoam_*.md
  - software/openfoam/examples_index.md
  - software/openfoam/assets/*.yaml
  runtime_policy: Runtime outputs under _results are supporting evidence only and are not canonical assets.
  conversation_policy: Conversation memory is not canonical unless it has been distilled into repository reports, configs, tests, or assets.
  status_policy: A passed smoke or diagnostic can mitigate risk, but it does not close benchmark promotion unless the required gate and reference policy also pass.
evidence_levels:
  repo_stable_report: Submitted report plus evidence_index entry.
  runtime_result: _results manifest, metrics, validation, or logs referenced by stable evidence.
  test_code_guard: Parser, schema, validation, config, or pytest guard that prevents silent regression.
  conversation_memory: Non-canonical lead; not used by this ledger.
work_queue_policy:
  priority_scale:
    P0: Blocks current OpenFOAM C01-C08 closure or a first-batch runtime smoke path.
    P1: Required before benchmark promotion or double-v closure, but not blocking local smoke execution.
    P2: Stable capability improvement or cross-profile/double-v follow-up after P0/P1.
    P3: Historical, mitigated, or observation-only item retained for traceability.
  status_values:
  - active
  - blocked
  - gap
  - mitigation_only
  - resolved
  ordering_rule: Work queue is ordered by priority first, then by ability to separate runtime-profile problems from capability problems.
  closure_rule: A queue item closes only when its referenced ledger entries gain stable repo evidence and tests or validation reports enforce the new claim boundary.
